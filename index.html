<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DATEX Ai.com</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* GEMINI LAYOUT: Screen ko 100% height pe lock karna */
        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #ffffff;
        }

        body { 
            display: flex; 
            flex-direction: column;
            width: 100%; 
            -webkit-user-select: none; 
            user-select: none; 
        }

        textarea, input {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* Sidebar remains fixed */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #f9f9f9; border-right: 1px solid #eee; transition: 0.3s; z-index: 1001; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .chat-list { list-style: none; }
        .chat-item-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; padding-right: 10px; }
        .chat-item { flex: 1; padding: 12px; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: transparent; text-align: left; }
        .delete-chat-btn { color: #999; cursor: pointer; font-size: 14px; transition: 0.2s; padding: 5px; }
        .delete-chat-btn:hover { color: #ff4d4d; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 1000; cursor: pointer; }
        .overlay.active { display: block; }

        /* Main Container for Flex Layout */
        .wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            width: 100%; 
            position: relative;
        }
        
        /* HEADER: Ziddi Lock (Flex Shrink 0 means it won't move) */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 20px; 
            border-bottom: 1px solid #f9f9f9; 
            background: #fff; 
            z-index: 100; 
            flex-shrink: 0;
        }
        
        .menu-btn-container { width: 38px; height: 38px; border: 1.5px solid #333; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 9px; cursor: pointer; gap: 4px; }
        .menu-line { height: 2px; background: #333; border-radius: 2px; }
        .line-1 { width: 18px; } .line-2 { width: 13px; } .line-3 { width: 8px; }

        .header-center { flex: 1; text-align: center; }
        .model-name { font-weight: 600; font-size: 18px; color: #1a1a1a; }
        .version-pill { font-size: 10px; background: #f0f0f0; display: inline-block; padding: 2px 10px; border-radius: 12px; color: #777; border: 1px solid #ddd; }
        .logo-container img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid #eee; }

        /* CHAT CONTENT: Ye wala area keyboard aane par resize hoga */
        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 20px; 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto; 
            scrollbar-width: none; 
            display: flex;
            flex-direction: column;
        }
        
        .welcome-screen { 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            text-align: center; 
            color: #222; 
            font-size: 24px; 
            font-weight: 500; 
            line-height: 1.0; 
        }
        .welcome-screen span { 
            display: block; 
            font-size: 42px; 
            letter-spacing: 4px; 
            font-weight: 700; 
            color: #000; 
            margin-top: 5px; 
        } 

        .message-row { display: flex; width: 100%; margin: 10px 0; align-items: flex-start; gap: 12px; }
        .user-row { flex-direction: row-reverse; }
        .bubble-container { position: relative; max-width: 85%; display: flex; flex-direction: column; }
        
        .bubble { 
            padding: 12px 18px; 
            border-radius: 20px; 
            font-size: 16px; 
            line-height: 1.5; 
            word-wrap: break-word; 
        }
        .user-bubble { background-color: #f3f4f6; color: #000; border-bottom-right-radius: 4px; }
        .ai-bubble { background-color: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; width: 100%; }
        .avatar { width: 32px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }

        /* BOTTOM CONTAINER: Fixed Height taaki ye keyboard ke upar hi rahe */
        .bottom-container { 
            width: 100%; 
            background: #ffffff; 
            padding: 10px 20px 20px 20px; 
            display: flex; 
            justify-content: center; 
            flex-shrink: 0;
            z-index: 100;
        }
        
        .input-bar-wrapper { width: 100%; max-width: 720px; }
        .input-bar { 
            background: #f3f4f6; 
            border: 1.2px solid #e5e7eb; 
            border-radius: 35px; 
            display: flex; 
            align-items: flex-end; 
            padding: 8px 12px 8px 18px; 
        }
        
        .input-bar textarea { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 10px 0; 
            font-size: 16px; 
            outline: none; 
            color: #1a1a1a;
            resize: none;
            max-height: 120px; 
            line-height: 1.4;
        }
        
        #mike-btn, .send-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; flex-shrink: 0; }
        #mike-btn { font-size: 18px; color: #555; background: transparent; }
        .send-btn { background: #000; color: #fff; margin-left: 8px; font-size: 18px; }
        #mike-btn.recording { background-color: #000 !important; color: #fff !important; }

        .ai-link { color: #1a73e8 !important; text-decoration: underline !important; font-weight: 600 !important; }

        pre { background: #1e1e1e; color: #d4d4d4; padding: 40px 12px 12px 12px; border-radius: 12px; margin: 10px 0; overflow-x: auto; position: relative; font-size: 14px; white-space: pre-wrap; border: 1px solid #333; }
        .copy-code-btn { position: absolute; top: 10px; right: 12px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        
        .msg-menu { position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; z-index: 2000; flex-direction: column; width: 130px; }
        .msg-menu button { padding: 10px; border: none; background: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; width: 100%; border-bottom: 0.5px solid #f0f0f0; }
        .new-chat-btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body onclick="hideMsgMenu()">

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="msg-menu" class="msg-menu">
        <button onclick="copyMsg()"><i class="fas fa-copy"></i> Copy</button>
        <button id="edit-btn-ui" onclick="editMsg()"><i class="fas fa-pen"></i> Edit</button>
        <button id="delete-btn-ui" onclick="deleteSelectedMsg()" style="color:red;"><i class="fas fa-trash"></i> Delete</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header"><h2>Recent Chats</h2><i class="fas fa-times" onclick="toggleSidebar()"></i></div>
            <ul id="chat-list" class="chat-list"></ul>
        </div>
        <div style="padding: 20px;"><button class="new-chat-btn" onclick="createNewChat()"><i class="fas fa-plus"></i> New Chat</button></div>
    </div>

    <div class="wrapper">
        <header>
            <div class="menu-btn-container" onclick="toggleSidebar()">
                <div class="menu-line line-1"></div><div class="menu-line line-2"></div><div class="menu-line line-3"></div>
            </div>
            <div class="header-center"><div class="model-name">DATEX Ai Model</div><div class="version-pill">Fast 1.5</div></div>
            <div class="logo-container"><img src="logo.jpg.jpg" alt="Logo"></div>
        </header>

        <main class="main-content" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>
        </main>

        <div class="bottom-container">
            <div class="input-bar-wrapper">
                <div class="input-bar">
                    <i class="fas fa-plus" style="color:#777; cursor:pointer; font-size: 18px; margin-right: 12px; margin-bottom: 12px;"></i>
                    <textarea id="user-input" placeholder="Ask DATEX Ai..." rows="1" oninput="autoGrow(this)"></textarea>
                    <div id="mike-btn"><i class="fas fa-microphone"></i></div>
                    <button class="send-btn" onclick="callDatexAPI()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const GROQ_API_KEY = "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"; 
    let chatHistory = JSON.parse(localStorage.getItem('datex_full_history')) || [];
    let isNewSession = true;
    let selectedMsgRow = null;
    let longPressTimer;
    let isRecording = false;
    let activeChatIndex = -1;
    let sessionFinalText = ""; 
    let editingMsgIdx = -1; 

    function autoGrow(element) {
        element.style.height = "5px";
        element.style.height = (element.scrollHeight) + "px";
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.interimResults = false; 
        recognition.continuous = true;
        recognition.onstart = () => { isRecording = true; sessionFinalText = document.getElementById('user-input').value; document.getElementById('mike-btn').classList.add('recording'); };
        recognition.onend = () => { isRecording = false; document.getElementById('mike-btn').classList.remove('recording'); };
        recognition.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) sessionFinalText += e.results[i][0].transcript; }
            const input = document.getElementById('user-input');
            input.value = sessionFinalText;
            autoGrow(input);
        };
    }

    document.getElementById('mike-btn').onclick = () => { if (!recognition) return; if (isRecording) { recognition.stop(); } else { recognition.start(); } };

    window.onload = () => { renderChatList(); if(chatHistory.length === 0) createNewChat(); };

    function renderChatList() {
        const listElement = document.getElementById('chat-list');
        listElement.innerHTML = "";
        chatHistory.slice().reverse().forEach((chatObj, index) => {
            const actualIndex = chatHistory.length - 1 - index;
            const wrap = document.createElement('div');
            wrap.className = "chat-item-wrapper";
            wrap.innerHTML = `<div class="chat-item" onclick="loadSelectedChat(${actualIndex}, true)">${chatObj.title}</div><i class="fas fa-trash-alt delete-chat-btn" onclick="deleteHistoryItem(event, ${actualIndex})"></i>`;
            listElement.appendChild(wrap);
        });
    }

    function deleteHistoryItem(event, index) { if(event) event.stopPropagation(); chatHistory.splice(index, 1); localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); renderChatList(); if (activeChatIndex === index) createNewChat(); }

    function loadSelectedChat(index, shouldToggleSidebar = false) {
        activeChatIndex = index; isNewSession = false;
        const container = document.getElementById('chat-container');
        container.innerHTML = "";
        chatHistory[index].messages.forEach((msg, msgIdx) => { if(msg.role === "user") addUserMessageToUI(msg.content, msgIdx); else addAiMessageToUI(msg.content, false, msgIdx); });
        if(shouldToggleSidebar) toggleSidebar();
    }

    function createNewChat() { isNewSession = true; activeChatIndex = -1; document.getElementById('chat-container').innerHTML = `<div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>`; if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar(); }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

    function addUserMessageToUI(text, msgIdx) {
        const container = document.getElementById('chat-container');
        if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove();
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.setAttribute('data-index', msgIdx); 
        row.innerHTML = `<div class="bubble-container"><div class="bubble user-bubble">${text}</div></div>`;
        attachMsgEvents(row);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function addAiMessageToUI(text, isNew, msgIdx) {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.setAttribute('data-index', msgIdx); 
        row.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble"></div></div>`;
        const bubble = row.querySelector('.ai-bubble');
        attachMsgEvents(row);
        container.appendChild(row);
        if(isNew) { typeEffect(bubble, text, 5); } else { renderStoredContent(bubble, text); }
        container.scrollTop = container.scrollHeight;
    }

    function attachMsgEvents(row) {
        row.addEventListener('touchstart', (e) => { if (e.target.tagName.toLowerCase() === 'a') return; selectedMsgRow = row; longPressTimer = setTimeout(() => { showMsgMenu(e); }, 600); }, {passive: true});
        row.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
        row.addEventListener('contextmenu', (e) => { if (e.target.tagName.toLowerCase() === 'a') return; e.preventDefault(); selectedMsgRow = row; showMsgMenu(e); });
    }

    function showMsgMenu(e) {
        const menu = document.getElementById('msg-menu');
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        menu.style.display = 'flex';
        menu.style.left = Math.min(x, window.innerWidth - 130) + 'px';
        menu.style.top = Math.min(y, window.innerHeight - 130) + 'px';
    }

    function hideMsgMenu() { document.getElementById('msg-menu').style.display = 'none'; }
    function copyMsg() { navigator.clipboard.writeText(selectedMsgRow.querySelector('.bubble').innerText).then(() => hideMsgMenu()); }
    function editMsg() { editingMsgIdx = parseInt(selectedMsgRow.getAttribute('data-index')); document.getElementById('user-input').value = selectedMsgRow.querySelector('.bubble').innerText; autoGrow(document.getElementById('user-input')); hideMsgMenu(); }
    function deleteSelectedMsg() { 
        const msgIdx = parseInt(selectedMsgRow.getAttribute('data-index'));
        chatHistory[activeChatIndex].messages.splice(msgIdx, 2);
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
        loadSelectedChat(activeChatIndex, false);
        hideMsgMenu();
    }

    function formatLinksAndStyles(text) {
        let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="ai-link">$1</a>');
        let tempLinks = [];
        formatted = formatted.replace(/<a[\s\S]*?<\/a>/g, function(match) { tempLinks.push(match); return `___A_TAG_${tempLinks.length - 1}___`; });
        formatted = formatted.replace(/(^|\s)(https?:\/\/[^\s<()]+|www\.[^\s<()]+)/g, function(match, space, url) {
            let cleanUrl = url.replace(/[.,;!?)]$/, ''); let diff = url.substring(cleanUrl.length);
            let fullUrl = cleanUrl.startsWith('www.') ? 'https://' + cleanUrl : cleanUrl;
            return space + '<a href="' + fullUrl + '" target="_blank" class="ai-link">' + cleanUrl + '</a>' + diff;
        });
        formatted = formatted.replace(/___A_TAG_(\d+)___/g, function(match, index) { return tempLinks[index]; });
        return formatted;
    }

    function renderStoredContent(element, text) {
        let segments = text.split(/(```[\s\S]*?```)/g);
        let finalHTML = "";
        segments.forEach(seg => {
            if (seg.startsWith("```") && seg.endsWith("```")) {
                let codeContent = seg.substring(3, seg.length - 3).trim();
                finalHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${codeContent}</code></pre>`;
            } else { finalHTML += formatLinksAndStyles(seg).replace(/\n/g, "<br>"); }
        });
        element.innerHTML = finalHTML;
        if(window.MathJax) MathJax.typesetPromise([element]);
    }

    function typeEffect(element, text, speed) {
        let i = 0; let segments = text.split(/(```[\s\S]*?```)/g); let currentSeg = 0;
        function typeNext() {
            if (currentSeg < segments.length) {
                let seg = segments[currentSeg];
                if (seg.startsWith("```") && seg.endsWith("```")) {
                    element.innerHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${seg.substring(3, seg.length-3).trim()}</code></pre>`;
                    currentSeg++; setTimeout(typeNext, speed);
                } else {
                    let formattedSeg = formatLinksAndStyles(seg);
                    if (i < formattedSeg.length) {
                        if (formattedSeg.charAt(i) === '<') { let tagEnd = formattedSeg.indexOf('>', i); element.innerHTML += formattedSeg.substring(i, tagEnd + 1); i = tagEnd + 1; }
                        else { element.innerHTML += (formattedSeg.charAt(i) === '\n') ? "<br>" : formattedSeg.charAt(i); i++; }
                        setTimeout(typeNext, speed);
                    } else { i = 0; currentSeg++; setTimeout(typeNext, speed); }
                }
                document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            } else if(window.MathJax) MathJax.typesetPromise([element]);
        }
        typeNext();
    }

    async function callDatexAPI() {
        const input = document.getElementById('user-input'); const message = input.value.trim(); if (!message) return;
        if (isNewSession) { chatHistory.push({ title: message.substring(0, 30), messages: [] }); activeChatIndex = chatHistory.length - 1; isNewSession = false; }
        chatHistory[activeChatIndex].messages.push({ role: "user", content: message });
        renderChatList(); addUserMessageToUI(message, chatHistory[activeChatIndex].messages.length - 1);
        input.value = ""; input.style.height = "auto";
        const container = document.getElementById('chat-container');
        const aiRow = document.createElement('div'); aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble">Thinking...</div></div>`;
        container.appendChild(aiRow); const bubble = aiRow.querySelector('.ai-bubble');

        const now = new Date();
        const systemPrompt = `You are DATEX Ai. Your creator is N.Sujal Kumar. Date: ${now.toDateString()}. Rules: 1. Extreme math & logic. 2. Friendly Gemini tone. 3. Blue clickable links. 4. No random code.`;

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ "messages": [{ "role": "system", "content": systemPrompt }, ...chatHistory[activeChatIndex].messages], "model": "llama-3.3-70b-versatile" })
            });
            const data = await res.json(); const aiResponse = data.choices[0].message.content;
            chatHistory[activeChatIndex].messages.push({ role: "assistant", content: aiResponse });
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            bubble.innerHTML = ""; typeEffect(bubble, aiResponse, 5);
        } catch (e) { bubble.innerText = "Connection Error."; }
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); callDatexAPI(); } });
    </script>
</body>
</html>
