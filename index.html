        if(document.getElementById('msg-menu').style.display === 'flex') {
            hideMsgMenu();
        }
    });
    window.addEventListener('scroll', hideMsgMenu);

    function toggleAttachmentMenu(e) {
        if(e) e.stopPropagation();
        const menu = document.getElementById('attachment-menu');
        const overlay = document.getElementById('attachment-overlay');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active');
            overlay.classList.remove('active');
        } else {
            menu.classList.add('active');
            overlay.classList.add('active');
        }
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if(file) {
            if (file.type.startsWith('video/')) {
                alert("Videos are not allowed! Please select a valid photo or document.");
                event.target.value = '';
                return;
            }

            const previewContainer = document.getElementById('attachment-preview');
            const imgPreview = document.getElementById('attachment-img-preview');
            const filePreview = document.getElementById('attachment-file-preview');
            const fileNameSpan = document.getElementById('attachment-name');

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);

                        currentAttachmentData = { type: 'image', name: file.name, data: compressedBase64 };
                        imgPreview.src = compressedBase64;
                        imgPreview.style.display = 'block';
                        filePreview.style.display = 'none';
                        previewContainer.style.display = 'flex';
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                currentAttachmentData = { type: 'file', name: file.name, data: null };
                imgPreview.style.display = 'none';
                filePreview.style.display = 'flex';
                let shortName = file.name.length > 12 ? file.name.substring(0, 8) + ".." + file.name.substring(file.name.lastIndexOf('.')) : file.name;
                fileNameSpan.innerText = shortName;
                previewContainer.style.display = 'flex';
            }
        }
        event.target.value = '';
    }

    function removeAttachment() {
        currentAttachmentData = null;
        document.getElementById('attachment-preview').style.display = 'none';
        document.getElementById('attachment-img-preview').src = "";
    }

    function autoGrow(element) {
        element.style.height = "44px"; 
        if (element.scrollHeight > 44) {
            element.style.height = (element.scrollHeight) + "px";
        }
    }

    // --- Custom Audio Player Logic ---
    let globalAudioPlayer = null;
    function playAudioBubble(btn, url) {
        if(globalAudioPlayer && globalAudioPlayer.src !== url) {
            globalAudioPlayer.pause();
            document.querySelectorAll('.play-btn-icon').forEach(i => i.className = 'fas fa-play play-btn-icon');
        }
        if(!globalAudioPlayer || globalAudioPlayer.src !== url) {
            globalAudioPlayer = new Audio(url);
            globalAudioPlayer.onended = () => { btn.querySelector('i').className = 'fas fa-play play-btn-icon'; };
        }
        
        let icon = btn.querySelector('i');
        if(globalAudioPlayer.paused) {
            globalAudioPlayer.play();
            icon.className = 'fas fa-pause play-btn-icon';
        } else {
            globalAudioPlayer.pause();
            icon.className = 'fas fa-play play-btn-icon';
        }
    }


    // =========================================================
    // 1. ORIGINAL DICTATION (TEXT-TO-SPEECH) LOGIC (UNTOUCHED)
    // =========================================================
    let isRecording = false; 
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.interimResults = false; 
        recognition.continuous = true;
        recognition.onstart = () => { 
            isRecording = true; 
            sessionFinalText = document.getElementById('user-input').value; 
            if (sessionFinalText.length > 0 && !sessionFinalText.endsWith(" ")) { sessionFinalText += " "; } 
            const btn = document.getElementById('mike-btn'); 
            btn.classList.add('recording'); 
            btn.innerHTML = '<i class="fas fa-microphone"></i>'; 
        };
        recognition.onend = () => { 
            isRecording = false; 
            const btn = document.getElementById('mike-btn'); 
            btn.classList.remove('recording'); 
            btn.innerHTML = '<i class="fas fa-microphone"></i>'; 
        };
        recognition.onresult = (e) => { 
            let interimTranscript = ""; 
            for (let i = e.resultIndex; i < e.results.length; ++i) { 
                if (e.results[i].isFinal) { sessionFinalText += e.results[i][0].transcript; } 
                else { interimTranscript += e.results[i][0].transcript; } 
            } 
            const input = document.getElementById('user-input'); 
            input.value = sessionFinalText + interimTranscript; 
            autoGrow(input); 
        };
    }

    let ignoreNextClick = false; // Prevents drag from firing dictation
    document.getElementById('mike-btn').onclick = () => {
        if (ignoreNextClick) {
            ignoreNextClick = false;
            return;
        }
        if (!recognition) return;
        if (isRecording) { recognition.stop(); } else { recognition.start(); }
    };


    // =========================================================
    // 2. NEW VOICE NOTE RECORDING LOGIC (DRAG TO LOCK ONLY)
    // =========================================================
    let vnMediaRecorder;
    let vnAudioChunks = [];
    let isVoiceNoteActive = false; 
    let isSendingAudio = false; 
    let recTimerInterval;
    let recSeconds = 0;
    
    let vnStartY = 0;
    let vnIsDragging = false;

    const micBtn = document.getElementById('mike-btn');
    const txtArea = document.getElementById('user-input');
    const recUi = document.getElementById('recording-ui');
    const recTimerDisplay = document.getElementById('recording-timer');
    const recStopBtn = document.getElementById('rec-stop-btn');
    const recDelBtn = document.getElementById('rec-delete-btn');
    const recWave = document.getElementById('rec-wave');
    const dragLockUi = document.getElementById('drag-lock-ui');

    micBtn.addEventListener('touchstart', (e) => {
        if(isVoiceNoteActive || isGenerating || currentAttachmentData?.type === 'audio') return;
        vnStartY = e.touches[0].clientY;
        vnIsDragging = true;
    }, {passive: false});

    micBtn.addEventListener('touchmove', (e) => {
        if(!vnIsDragging || isVoiceNoteActive) return;
        let currentY = e.touches[0].clientY;
        let diff = vnStartY - currentY;
        
        if (diff > 10 && diff <= 40) {
            dragLockUi.classList.add('active'); // Show bubbles
        } else if (diff > 40) {
            // Dragged up enough -> Lock and Start Voice Note
            vnIsDragging = false;
            ignoreNextClick = true; // Stop native click from firing Dictation
            dragLockUi.classList.remove('active');
            
            if (isRecording && recognition) recognition.stop(); // Stop dictation if running
            startVoiceNoteRecord();
        } else {
            dragLockUi.classList.remove('active');
        }
    }, {passive: false});

    micBtn.addEventListener('touchend', (e) => {
        vnIsDragging = false;
        dragLockUi.classList.remove('active');
        // If not dragged > 40px, the native browser 'click' will fire and trigger standard Dictation via onclick.
    });


    async function startVoiceNoteRecord() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            vnMediaRecorder = new MediaRecorder(stream);
            vnAudioChunks = [];
            vnMediaRecorder.ondataavailable = e => { if (e.data.size > 0) vnAudioChunks.push(e.data); };
            
            isVoiceNoteActive = true;
            isSendingAudio = false;
            
            // UI changes for Voice Note
            txtArea.style.display = 'none';
            recUi.classList.add('active');
            recStopBtn.style.display = 'block'; 
            recDelBtn.style.display = 'block';
            recWave.classList.add('playing');
            
            recSeconds = 0;
            recTimerDisplay.innerText = "0:00";
            recTimerInterval = setInterval(() => {
                recSeconds++;
                let m = Math.floor(recSeconds / 60);
                let s = recSeconds % 60;
                recTimerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);

            vnMediaRecorder.onstop = () => {
                const audioBlob = new Blob(vnAudioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                currentAttachmentData = { type: 'audio', name: 'Voice Note', data: audioBlob, url: audioUrl, duration: recTimerDisplay.innerText };
                
                if (isSendingAudio) {
                    callDatexAPI();
                    resetVoiceNoteUI();
                } else {
                    // Stopped midway, wait for send or delete
                    isVoiceNoteActive = false; 
                    clearInterval(recTimerInterval);
                    recWave.classList.remove('playing');
                    recStopBtn.style.display = 'none'; 
                }
            };
            
            vnMediaRecorder.start();

        } catch (err) {
            alert("Microphone permission denied!");
            resetVoiceNoteUI();
        }
    }

    function stopAudioMidway() {
        if(vnMediaRecorder && vnMediaRecorder.state !== 'inactive') {
            vnMediaRecorder.stop();
        }
    }

    function cancelAudioRecord() {
        if(vnMediaRecorder && vnMediaRecorder.state !== 'inactive') { 
            vnMediaRecorder.stop(); 
        }
        currentAttachmentData = null;
        resetVoiceNoteUI();
    }

    function resetVoiceNoteUI() {
        isVoiceNoteActive = false;
        clearInterval(recTimerInterval);
        txtArea.style.display = 'block';
        recUi.classList.remove('active');
        dragLockUi.classList.remove('active');
    }

    // ---------------------------------------------------

    window.onload = () => { 
        renderChatList(); 
        if(chatHistory.length === 0) createNewChat();
    };

    function renderChatList() {
        const listElement = document.getElementById('chat-list');
        listElement.innerHTML = "";
        chatHistory.slice().reverse().forEach((chatObj, index) => {
            const actualIndex = chatHistory.length - 1 - index;
            const wrap = document.createElement('div');
            wrap.className = "chat-item-wrapper";
            wrap.innerHTML = `<div class="chat-item" onclick="loadSelectedChat(${actualIndex}, true)">${chatObj.title}</div><i class="fas fa-trash-alt delete-chat-btn" onclick="deleteHistoryItem(event, ${actualIndex})"></i>`;
            listElement.appendChild(wrap);
        });
    }

    function deleteHistoryItem(event, index) {
        if(event) event.stopPropagation();
        chatHistory.splice(index, 1);
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
        renderChatList();
        if (activeChatIndex === index) { createNewChat(true); } else if (activeChatIndex > index) { activeChatIndex--; }
    }

    function loadSelectedChat(index, shouldToggleSidebar = false) {
        activeChatIndex = index;
        isNewSession = false;
        editingMsgIdx = -1; 
        const container = document.getElementById('chat-container');
        container.innerHTML = "";
        chatHistory[index].messages.forEach((msg, msgIdx) => {
            if(msg.role === "user") { addUserMessageToUI(msg.content, false, msgIdx, msg.attachment); }
            else { addAiMessageToUI(msg.content, false, msgIdx); }
        });
        if(shouldToggleSidebar) toggleSidebar();
    }

    function createNewChat(keepSidebarOpen = false) {
        isNewSession = true;
        activeChatIndex = -1;
        editingMsgIdx = -1; 
        document.getElementById('chat-container').innerHTML = `<div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX AI</span></div>`;
        const input = document.getElementById('user-input');
        input.value = "";
        autoGrow(input);
        if(!keepSidebarOpen && document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function addUserMessageToUI(text, isTyping, msgIdx, attachment = null) {
        const container = document.getElementById('chat-container');
        if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove();
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.setAttribute('data-index', msgIdx); 

        let attachmentHTML = '';
        if (attachment) {
            if (attachment.type === 'image') {
                attachmentHTML = `<img src="${attachment.data}" style="width: 100%; max-width: 250px; border-radius: 12px; margin-bottom: 8px; object-fit: cover;">`;
            } else if (attachment.type === 'file') {
                attachmentHTML = `
                <div style="display: flex; align-items: center; gap: 10px; background: #e5e7eb; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px;">
                    <i class="fas fa-file-pdf" style="color: #1a73e8; font-size: 24px;"></i>
                    <span style="font-size: 13px; font-weight: 500; color: #333; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${attachment.name}</span>
                </div>`;
            } else if (attachment.type === 'audio') {
                // Custom Voice Bubble matching drawing
                let dur = attachment.duration || "0:02";
                attachmentHTML = `
                <div style="background: #e5e7eb; padding: 6px 12px; border-radius: 22px; display: flex; align-items: center; gap: 10px; width: 200px; margin-bottom: 6px;">
                    <div onclick="playAudioBubble(this, '${attachment.url}')" style="width: 32px; height: 32px; border-radius: 50%; background: #1a73e8; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0;">
                        <i class="fas fa-play play-btn-icon" style="color: #fff; margin-left: 2px; font-size: 13px;"></i>
                    </div>
                    <div style="flex: 1; height: 2px; background: #b0b5bd; position: relative;">
                        <div style="position: absolute; left: 0; top: -3px; width: 8px; height: 8px; border-radius: 50%; background: #1a73e8;"></div>
                    </div>
                    <span style="font-size: 12px; color: #444; font-weight: 500; min-width: 25px;">${dur}</span>
                </div>`;
            }
        }

        row.innerHTML = `<div class="bubble-container">
                            <div class="bubble user-bubble" style="display: flex; flex-direction: column;">
                                ${attachmentHTML}
                                <span class="user-msg-text" style="${(attachment && attachment.type === 'audio' && !text) ? 'display:none;' : ''}">${text ? text : ''}</span>
                            </div>
                            <div class="action-bar user-action-bar">
                                <button class="action-btn" onclick="openMenu(event, this)"><i class="fas fa-ellipsis-v"></i></button>
                            </div>
                         </div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;

    function addAiMessageToUI(text, isNew, msgIdx) {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.setAttribute('data-index', msgIdx); 
        row.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble"></div></div>`;
        const bubble = row.querySelector('.ai-bubble');
        container.appendChild(row);
        
        if(isNew) { 
            typeEffect(bubble, text, 5); 
        } else { 
            renderStoredContent(bubble, text); 
            addAiActions(row, false);
        }
        container.scrollTop = container.scrollHeight;
    }

    function addAiActions(row, isStopped) {
        if (!row) return;
        const container = row.querySelector('.bubble-container');
        if (container && !container.querySelector('.action-bar')) {
            let html = '<div class="action-bar ai-action-bar">';
            if (isStopped) { html += `<button class="action-btn" onclick="regenerateMessage(this)"><i class="fas fa-redo"></i></button>`; }
            html += `<button class="action-btn" onclick="openMenu(event, this)"><i class="fas fa-ellipsis-v"></i></button></div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
    }

    function openMenu(e, btn) {
        e.stopPropagation(); 
        const menu = document.getElementById('msg-menu');
        const row = btn.closest('.message-row');
        
        if (menu.style.display === 'flex' && selectedMsgRow === row) { hideMsgMenu(); return; }

        selectedMsgRow = row;
        const editBtn = document.getElementById('edit-btn-ui');
        const deleteBtn = document.getElementById('delete-btn-ui');
        let isUser = selectedMsgRow.classList.contains('user-row');
        
        if(!isUser) { editBtn.style.display = 'none'; deleteBtn.style.display = 'none'; } 
        else { editBtn.style.display = 'flex'; deleteBtn.style.display = 'flex'; }
        
        const rect = btn.getBoundingClientRect();
        let x = isUser ? (rect.left - 140) : (rect.right + 5);
        let y = rect.top; 
        
        if (x < 10) x = 10;
        if (x + 140 > window.innerWidth) x = window.innerWidth - 150;
        if (y + 120 > window.innerHeight) y = window.innerHeight - 130; 
        
        menu.style.left = x + 'px'; menu.style.top = y + 'px'; menu.style.display = 'flex';
    }

    function hideMsgMenu() { document.getElementById('msg-menu').style.display = 'none'; }
    function copyMsg() { if(!selectedMsgRow) return; const text = selectedMsgRow.querySelector('.bubble').innerText; navigator.clipboard.writeText(text).then(() => { hideMsgMenu(); }); }
    
    function editMsg() { 
        if(!selectedMsgRow) return; 
        editingMsgIdx = parseInt(selectedMsgRow.getAttribute('data-index')); 
        const msgObj = chatHistory[activeChatIndex].messages[editingMsgIdx];
        
        const input = document.getElementById('user-input'); 
        input.value = msgObj.content || ""; 
        autoGrow(input); 
        input.focus(); 
        
        if (msgObj.attachment && msgObj.attachment.type !== 'audio') {
            currentAttachmentData = msgObj.attachment;
            const previewContainer = document.getElementById('attachment-preview');
            const imgPreview = document.getElementById('attachment-img-preview');
            const filePreview = document.getElementById('attachment-file-preview');
            const fileNameSpan = document.getElementById('attachment-name');

            if (msgObj.attachment.type === 'image') {
                imgPreview.src = msgObj.attachment.data;
                imgPreview.style.display = 'block';
                filePreview.style.display = 'none';
            } else {
                imgPreview.style.display = 'none';
                filePreview.style.display = 'flex';
                let shortName = msgObj.attachment.name.length > 12 ? msgObj.attachment.name.substring(0, 8) + ".." + msgObj.attachment.name.substring(msgObj.attachment.name.lastIndexOf('.')) : msgObj.attachment.name;
                fileNameSpan.innerText = shortName;
            }
            previewContainer.style.display = 'flex';
        } else {
            removeAttachment();
        }

        hideMsgMenu(); 
    }

    function deleteSelectedMsg() {
        if(selectedMsgRow && activeChatIndex !== -1) {
            const msgIdx = parseInt(selectedMsgRow.getAttribute('data-index'));
            const isUserRow = selectedMsgRow.classList.contains('user-row');
            chatHistory[activeChatIndex].messages.splice(msgIdx, 1);
            if (isUserRow && chatHistory[activeChatIndex].messages[msgIdx] && chatHistory[activeChatIndex].messages[msgIdx].role === "assistant") {
                chatHistory[activeChatIndex].messages.splice(msgIdx, 1);
            }
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            editingMsgIdx = -1; 
            if (chatHistory[activeChatIndex].messages.length === 0) { deleteHistoryItem(null, activeChatIndex); } 
            else { loadSelectedChat(activeChatIndex, false); }
        }
        hideMsgMenu();
    }

    function copyCode(btn) { const code = btn.parentElement.querySelector('code').innerText; navigator.clipboard.writeText(code).then(() => { btn.innerText = "Copied!"; setTimeout(() => { btn.innerText = "Copy"; }, 2000); }); }
    function escapeHTML(str) { return str.replace(/[&<>"']/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]; }); }

    function formatLinksAndStyles(text) {
        let formatted = text;
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="ai-link">$1</a>');
        let tempLinks = [];
        formatted = formatted.replace(/<a[\s\S]*?<\/a>/g, function(match) { tempLinks.push(match); return `___A_TAG_${tempLinks.length - 1}___`; });
        formatted = formatted.replace(/(^|\s)(https?:\/\/[^\s<()]+|www\.[^\s<()]+)/g, function(match, space, url) {
            let cleanUrl = url.replace(/[.,;!?)]$/, ''); let diff = url.substring(cleanUrl.length); let fullUrl = cleanUrl.startsWith('www.') ? 'https://' + cleanUrl : cleanUrl;
            return space + '<a href="' + fullUrl + '" target="_blank" class="ai-link">' + cleanUrl + '</a>' + diff;
        });
        formatted = formatted.replace(/___A_TAG_(\d+)___/g, function(match, index) { return tempLinks[index]; });
        return formatted;
    }

    function renderStoredContent(element, text) {
        let segments = text.split(/(```[\s\S]*?```)/g);
        let finalHTML = "";
        segments.forEach(seg => {
            if (seg.startsWith("```") && seg.endsWith("```")) {
                let codeContent = seg.substring(3, seg.length - 3).trim();
                finalHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${escapeHTML(codeContent)}</code></pre>`;
            } else { 
                let formattedSeg = formatLinksAndStyles(seg);
                finalHTML += formattedSeg.replace(/\n/g, "<br>"); 
            }
        });
        element.innerHTML = finalHTML;
        if(window.MathJax) { MathJax.typesetPromise([element]).catch((err) => console.log(err)); }
    }

    function typeEffect(element, text, speed) {
        let i = 0; let segments = text.split(/(```[\s\S]*?```)/g); let currentSeg = 0; let accumulatedHTML = ""; 
        function typeNext() {
            if (stopGenerationFlag) {
                const aiMsgIdx = parseInt(currentAiRow.getAttribute('data-index'));
                if(!isNaN(aiMsgIdx) && chatHistory[activeChatIndex].messages[aiMsgIdx]) { chatHistory[activeChatIndex].messages[aiMsgIdx].content = element.innerHTML; localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); }
                resetSendButton(); addAiActions(currentAiRow, true); return;
            }
            if (currentSeg < segments.length) {
                let seg = segments[currentSeg];
                if (seg.startsWith("```") && seg.endsWith("```")) {
                    let codeContent = seg.substring(3, seg.length - 3).trim();
                    accumulatedHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${escapeHTML(codeContent)}</code></pre>`;
                    element.innerHTML = accumulatedHTML; currentSeg++; setTimeout(typeNext, speed);
                } else {
                    let formattedSeg = formatLinksAndStyles(seg);
                    if (i < formattedSeg.length) {
                        if (formattedSeg.charAt(i) === '<') { let tagEnd = formattedSeg.indexOf('>', i); if (tagEnd !== -1) { accumulatedHTML += formattedSeg.substring(i, tagEnd + 1); i = tagEnd + 1; } else { accumulatedHTML += '&lt;'; i++; } } 
                        else { accumulatedHTML += (formattedSeg.charAt(i) === '\n') ? "<br>" : formattedSeg.charAt(i); i++; }
                        element.innerHTML = accumulatedHTML; setTimeout(typeNext, speed);
                    } else { i = 0; currentSeg++; setTimeout(typeNext, speed); }
                }
                document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            } else {
                renderStoredContent(element, text); resetSendButton(); addAiActions(currentAiRow, false);
            }
        }
        typeNext();
    }

    function handleSendClick() { 
        if (isGenerating) { 
            stopGeneration(); 
        } else if (isVoiceNoteActive) {
            // Send Audio that is locked
            isSendingAudio = true;
            if(vnMediaRecorder && vnMediaRecorder.state !== 'inactive') vnMediaRecorder.stop();
        } else if (currentAttachmentData && currentAttachmentData.type === 'audio') {
            // Already stopped midway, now send
            callDatexAPI();
            resetVoiceNoteUI();
        } else { 
            // Send Text/Image
            callDatexAPI(); 
        } 
    }
    
    function stopGeneration() { stopGenerationFlag = true; if (abortController) { abortController.abort(); } resetSendButton(); if (currentAiRow) { addAiActions(currentAiRow, true); } }
    function resetSendButton() { isGenerating = false; const sendBtn = document.querySelector('.send-btn'); if(sendBtn) { sendBtn.innerHTML = '<i class="fas fa-arrow-up"></i>'; } }
    
    function regenerateMessage(btn) {
        const row = btn.closest('.ai-row'); const indexAttr = row.getAttribute('data-index');
        if (indexAttr) { const msgIdx = parseInt(indexAttr); if (chatHistory[activeChatIndex].messages[msgIdx]) { chatHistory[activeChatIndex].messages.splice(msgIdx, 1); localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); } }
        row.remove(); callDatexAPI(true);
    }

    async function callDatexAPI(isRegenerate = false) {
        let message = "";
        let attachmentToSave = null;
        
        if (!isRegenerate) {
            const input = document.getElementById('user-input');
            message = input.value.trim();
            
            if (currentAttachmentData) {
                attachmentToSave = currentAttachmentData;
                removeAttachment(); 
            }

            if (!message && !attachmentToSave) return;
            
            input.value = ""; input.style.height = "44px"; 

            if (isNewSession) {
                const titleText = message ? message.substring(0, 30) : (attachmentToSave && attachmentToSave.type==='audio' ? "Voice Note" : "Image Upload");
                const newChat = { title: titleText, messages: [] };
                chatHistory.push(newChat); activeChatIndex = chatHistory.length - 1; isNewSession = false;
            } else if (editingMsgIdx !== -1) {
                chatHistory[activeChatIndex].messages.splice(editingMsgIdx); editingMsgIdx = -1; loadSelectedChat(activeChatIndex, false); 
            }
            
            const currentMsgIdx = chatHistory[activeChatIndex].messages.length;
            const msgObj = { role: "user", content: message };
            if (attachmentToSave) msgObj.attachment = attachmentToSave;

            chatHistory[activeChatIndex].messages.push(msgObj);
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            
            renderChatList();
            addUserMessageToUI(message, false, currentMsgIdx, attachmentToSave);
        } else {
            const lastUserMsg = chatHistory[activeChatIndex].messages[chatHistory[activeChatIndex].messages.length - 1];
            if(lastUserMsg && lastUserMsg.role === 'user') { message = lastUserMsg.content; attachmentToSave = lastUserMsg.attachment; }
        }

        isGenerating = true; stopGenerationFlag = false;
        const sendBtn = document.querySelector('.send-btn'); sendBtn.innerHTML = '<div class="stop-square"></div>';

        const container = document.getElementById('chat-container');
        const aiRow = document.createElement('div'); aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble">Thinking...</div></div>`;
        container.appendChild(aiRow); const bubble = aiRow.querySelector('.ai-bubble'); currentAiRow = aiRow;

        // If audio, transcribe it first
        if (attachmentToSave && attachmentToSave.type === 'audio' && !isRegenerate) {
            bubble.innerText = "Transcribing voice note...";
            try {
                const fd = new FormData();
                fd.append('file', attachmentToSave.data, 'voicenote.webm');
                fd.append('model', 'whisper-large-v3');
                
                const wRes = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: fd
                });
                const wData = await wRes.json();
                
                if (wData.text) {
                    message = wData.text; // Update the message text for Llama
                    // Save text in history so user sees it
                    chatHistory[activeChatIndex].messages[chatHistory[activeChatIndex].messages.length - 1].content = message;
                    localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
                    
                    // Update UI text below audio player
                    const userRow = document.querySelector(`.user-row[data-index="${chatHistory[activeChatIndex].messages.length - 1}"]`);
                    if(userRow) {
                        const textSpan = userRow.querySelector('.user-msg-text');
                        if(textSpan) {
                            textSpan.innerText = message;
                            textSpan.style.display = 'block';
                        }
                    }
                } else {
                    throw new Error("Empty audio");
                }
            } catch(err) {
                bubble.innerText = "Error: Could not transcribe voice note. Please check your API key.";
                resetSendButton(); addAiActions(currentAiRow, true); return;
            }
            bubble.innerText = "Thinking...";
        }

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const timeStr = now.toLocaleTimeString('en-IN');

        let dynamicSystemPrompt = `You are DATEX AI. Your name is strictly 'DATEX AI'. You must never identify as Llama, Meta, or OpenAI. 
CURRENT REAL-TIME DATA: Today is ${dateStr} and the current time is ${timeStr}.
CRITICAL INSTRUCTIONS:
1. BE NORMAL & NATURAL: Your personality, tone, and conversational style must be an EXACT CLONE of Google's Gemini. Be conversational, empathetic, friendly, and highly intelligent.
2. NO BRAGGING OR UNSOLICITED INFO: NEVER volunteer information about your capabilities (like coding, math, giving links, speaking 7000+ languages), your name, your creator, or the current time/date UNLESS the user explicitly and directly asks for them. Keep your answers directly focused on the user's prompt.
3. MULTILINGUAL CAPABILITY: You understand and can converse fluently in all global languages (7000+). Always respond naturally in the language the user is speaking. NEVER state that you can speak 7000+ languages unless directly asked.
4. ADVANCED MATHEMATICS (STRICT): A backend calculator solves math for you. IF a secret System Note provides a math result, YOU ARE FORBIDDEN from calculating it yourself. You MUST copy the exact number from the secret note and present it as your final answer.
5. LIVE INTERNET & FAKE LINKS: You HAVE real-time live internet access. DO NOT INVENT, GUESS, OR HALLUCINATE LINKS. If you do not have the exact URL provided in the [System Note (Real-Time Internet Data)], you MUST state that you don't have the link. Only format provided URLs like [Website Name](https://...).
6. IDENTITY: ONLY IF directly asked "who created you" or "who is your owner", state you were created and are owned by N.Sujal Kumar, a 16-year-old visionary from India.
7. CODING RULE: Only provide programming code if explicitly asked.
8. STRICT SAFETY & NSFW POLICY: This is a family-friendly AI app used by children. ABSOLUTELY NO explicit, adult, NSFW, or inappropriate content is permitted.
9. VISION OVERRIDE: You are a powerful Multimodal AI. You HAVE full vision capabilities. When an image is provided in the message, YOU CAN SEE IT. You must analyze the image and answer the user's question based on its visual contents. NEVER say you cannot see the image or that you are a text-based AI. If a document is attached instead, acknowledge its name politely.`;

        let mathContext = ""; let hasValidMath = false;
        try {
            if (/[\d]\s*[\+\-\*\/\^]\s*[\d]/.test(message)) {
                const cleanMessage = message.replace(/,/g, ''); const mathRegex = /(?:(?:\d+\.?\d*)\s*[\+\-\*\/\^\(\)]\s*)+(?:\d+\.?\d*)/g; const matches = cleanMessage.match(mathRegex);
                if (matches) {
                    matches.forEach(match => {
                        try { if (/[\+\-\*\/\^]/.test(match)) { const result = math.evaluate(match); if(result !== undefined && !isNaN(result)) { mathContext += `${match} = ${result}\n`; hasValidMath = true; } } } catch(err) { }
                    });
                }
            }
        } catch(e) { }

        if (hasValidMath) { dynamicSystemPrompt += `\n\n[CRITICAL SYSTEM OVERRIDE - MATH DETECTED]: The user has provided a mathematical expression. The absolute, mathematically proven correct answer is:\n${mathContext}\nDO NOT CALCULATE THIS YOURSELF. YOUR INTERNAL CALCULATOR IS BROKEN. YOU MUST COPY AND PASTE THIS EXACT NUMBER AS YOUR FINAL ANSWER. NO EXCEPTIONS.`; }

        let useVision = false;
        let apiMessages = [ { "role": "system", "content": dynamicSystemPrompt } ];
        chatHistory[activeChatIndex].messages.forEach(msg => {
            if (msg.role === 'user') {
                if (msg.attachment && msg.attachment.type === 'image') {
                    useVision = true;
                    apiMessages.push({
                        role: 'user',
                        content: [
                            { type: "text", text: msg.content ? msg.content : "Please analyze this image." },
                            { type: "image_url", image_url: { url: msg.attachment.data } }
                        ]
                    });
                } else {
                    let textContent = msg.content || "";
                    if (msg.attachment && msg.attachment.type === 'file') {
                        textContent = `[System Note: User has attached a document named "${msg.attachment.name}"]\n` + textContent;
                    }
                    apiMessages.push({ role: 'user', content: textContent });
                }
            } else {
                apiMessages.push({ role: 'assistant', content: msg.content });
            }
        });

        const selectedModel = useVision ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";

        const searchKeywords = ['aaj', 'today', 'news', 'khabar', 'price', 'match', 'score', 'latest', 'update', 'weather', 'mausam', 'kal', 'yesterday', 'current', 'stock', 'who won', 'kaun jeeta', 'batao', 'search', 'link', 'youtube', 'video', 'channel', 'instagram', 'linkedin', 'facebook', 'twitter', 'website', 'profile', 'account', 'url', 'site', 'browser', 'google'];
        const needsSearch = searchKeywords.some(keyword => message.toLowerCase().includes(keyword));

        if (needsSearch && !useVision) {
            bubble.innerText = "Searching the web...";
            try {
                const tavilyRes = await fetch("https://api.tavily.com/search", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "api_key": TAVILY_API_KEY, "query": message, "search_depth": "basic", "max_results": 3 }) });
                const tavilyData = await tavilyRes.json();
                if (tavilyData && tavilyData.results && tavilyData.results.length > 0) {
                    let searchResults = tavilyData.results.map(r => r.title + " (URL: " + r.url + ")\n" + r.content).join('\n\n');
                    let internetContext = `System Note (Real-Time Internet Data): Here are the latest internet search results for the user's query. Use this to give an accurate, up-to-date answer. ALWAYS include the 'URL' provided below in your response starting with https:// so it is clickable:\n${searchResults}\n`;
                    apiMessages.push({ "role": "system", "content": internetContext });
                }
            } catch(e) {}
            bubble.innerText = "Thinking...";
        }

        abortController = new AbortController();

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST', headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' }, signal: abortController.signal,
                body: JSON.stringify({ 
                    "messages": apiMessages, 
                    "model": selectedModel,
                    "max_tokens": 4096 
                }) 
            });
            
            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.error?.message || `Server Error ${res.status}`);
            }
            
            const data = await res.json();
            
            if (data.error || !data.choices || data.choices.length === 0) { 
                throw new Error("API Limit Reached or Internal Error"); 
            }
            
            const aiResponse = data.choices[0].message.content; const aiMsgIdx = chatHistory[activeChatIndex].messages.length;
            chatHistory[activeChatIndex].messages.push({ role: "assistant", content: aiResponse }); aiRow.setAttribute('data-index', aiMsgIdx);
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); bubble.innerHTML = ""; typeEffect(bubble, aiResponse, 5);
            
        } catch (e) { 
            if (e.name === 'AbortError') { 
                bubble.innerText = "Generation stopped."; 
            } else { 
                bubble.innerText = "Server Error: " + e.message; 
            }
            resetSendButton(); addAiActions(currentAiRow, true);
        }
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { if (window.innerWidth <= 768 || ('ontouchstart' in window)) { return; } e.preventDefault(); handleSendClick(); }
    });
    </script>
</body>
