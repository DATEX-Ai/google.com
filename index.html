<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DATEX Ai.com</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; color: #333; height: 100vh; display: flex; overflow: hidden; width: 100%; position: fixed; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #f9f9f9; border-right: 1px solid #eee; transition: 0.3s; z-index: 1001; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .chat-list { list-style: none; }
        .chat-item-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; padding-right: 10px; }
        .chat-item { flex: 1; padding: 12px; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: transparent; text-align: left; }
        .delete-chat-btn { color: #999; cursor: pointer; font-size: 14px; padding: 10px; transition: 0.2s; }
        .delete-chat-btn:hover { color: #ff4d4d; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 1000; }
        .overlay.active { display: block; }
        
        .wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; width: 100%; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; background: #fff; flex-shrink: 0; }
        .menu-btn-container { width: 38px; height: 38px; border: 1.5px solid #333; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 9px; cursor: pointer; gap: 4px; }
        .menu-line { height: 2px; background: #333; border-radius: 2px; }
        .line-1 { width: 18px; } .line-2 { width: 13px; } .line-3 { width: 8px; }
        .header-center { flex: 1; text-align: center; }
        .model-name { font-weight: 600; font-size: 18px; color: #1a1a1a; }
        .version-pill { font-size: 10px; background: #f0f0f0; display: inline-block; padding: 2px 10px; border-radius: 12px; color: #777; border: 1px solid #ddd; }
        .logo-container img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid #eee; }
        
        /* Fixed Scroll Problem - Padding increased at bottom */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px 20px 120px 20px; width: 100%; max-width: 800px; margin: 0 auto; scroll-behavior: smooth; }
        
        .welcome-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; flex: 1; text-align: center; color: #222; font-size: 24px; font-weight: 500; }
        .welcome-screen span { display: block; font-size: 42px; letter-spacing: 4px; font-weight: 700; color: #000; margin-top: 5px; } 
        .message-row { display: flex; width: 100%; margin: 15px 0; align-items: flex-start; gap: 12px; }
        .user-row { flex-direction: row-reverse; }
        .bubble-container { position: relative; max-width: 88%; display: flex; flex-direction: column; }
        .bubble { padding: 14px 20px; border-radius: 22px; font-size: 16px; line-height: 1.6; word-wrap: break-word; }
        .user-bubble { background-color: #f3f4f6; color: #000; border-bottom-right-radius: 4px; }
        .ai-bubble { background-color: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }
        
        /* Solid Input Wall - No Shadow */
        .bottom-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1.5px solid #f9f9f9; padding: 10px 0 25px 0; display: flex; justify-content: center; z-index: 100; }
        .input-bar { width: 92%; max-width: 720px; background: #f3f4f6; border: 1.2px solid #e5e7eb; border-radius: 35px; display: flex; align-items: center; padding: 6px 10px 6px 18px; min-height: 52px; }
        .input-bar textarea { flex: 1; background: transparent; border: none; padding: 10px 0; font-size: 16px; outline: none; color: #1a1a1a; resize: none; max-height: 150px; overflow-y: auto; line-height: 1.4; }
        
        /* Buttons Alignment & Spacing */
        .actions-right { display: flex; align-items: center; gap: 10px; align-self: center; }
        #mike-btn, .send-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; flex-shrink: 0; }
        #mike-btn { font-size: 18px; color: #555; background: transparent; }
        .send-btn { background: #000; color: #fff; font-size: 16px; }
        #mike-btn.recording { background-color: #000 !important; color: #fff !important; }
        
        pre { background: #1e1e1e !important; color: #d4d4d4 !important; padding: 45px 15px 15px 15px; border-radius: 12px; margin: 15px 0; overflow-x: auto; position: relative; }
        .code-copy-btn { position: absolute; top: 10px; right: 12px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 10; font-weight: 600; }
        .ai-bubble a { color: #0066cc !important; text-decoration: underline !important; font-weight: 600; }
        
        .msg-menu { position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; z-index: 2000; flex-direction: column; width: 140px; }
        .msg-menu button { padding: 12px; border: none; background: none; text-align: left; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid #f0f0f0; }
        .new-chat-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body onclick="hideMsgMenu()">
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="msg-menu" class="msg-menu">
        <button onclick="copyMsg()"><i class="fas fa-copy"></i> Copy</button>
        <button id="edit-btn-ui" onclick="editMsg()"><i class="fas fa-pen"></i> Edit</button>
        <button id="delete-btn-ui" onclick="deleteSelectedMsg()" style="color:red;"><i class="fas fa-trash"></i> Delete</button>
    </div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header"><h2>Recent Chats</h2><i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i></div>
            <ul id="chat-list" class="chat-list"></ul>
        </div>
        <div style="padding: 20px;"><button class="new-chat-btn" onclick="createNewChat()"><i class="fas fa-plus"></i> New Chat</button></div>
    </div>
    <div class="wrapper">
        <header>
            <div class="header-left"><div class="menu-btn-container" onclick="toggleSidebar()"><div class="menu-line line-1"></div><div class="menu-line line-2"></div><div class="menu-line line-3"></div></div></div>
            <div class="header-center"><div class="model-name">DATEX Ai Model</div><div class="version-pill">Fast 1.5</div></div>
            <div class="header-right"><div class="logo-container"><img src="logo.jpg.jpg" alt="Logo"></div></div>
        </header>
        <main class="main-content" id="chat-container"><div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div></main>
        
        <div class="bottom-container">
            <div class="input-bar">
                <i class="fas fa-plus" style="color:#777; font-size: 18px; margin-right: 12px; cursor:pointer;"></i>
                <textarea id="user-input" placeholder="Ask DATEX Ai..." rows="1" oninput="autoGrow(this)"></textarea>
                <div class="actions-right">
                    <div id="mike-btn"><i class="fas fa-microphone"></i></div>
                    <button class="send-btn" onclick="callDatexAPI()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const GROQ_API_KEY = "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"; 
    // Fixed history recovery logic
    let chatHistory = JSON.parse(localStorage.getItem('datex_full_history')) || [];
    let isNewSession = true, selectedMsgRow = null, longPressTimer, isRecording = false, activeChatIndex = -1;

    marked.setOptions({ gfm: true, breaks: true });

    function autoGrow(element) { element.style.height = "auto"; element.style.height = (element.scrollHeight) + "px"; }

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 2000);
        });
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.interimResults = false; recognition.continuous = true;
        recognition.onstart = () => { isRecording = true; document.getElementById('mike-btn').classList.add('recording'); };
        recognition.onend = () => { isRecording = false; document.getElementById('mike-btn').classList.remove('recording'); };
        recognition.onresult = (e) => {
            const input = document.getElementById('user-input');
            const transcript = e.results[e.results.length - 1][0].transcript;
            if(e.results[e.results.length - 1].isFinal) {
                input.value += (input.value.length > 0 ? " " : "") + transcript;
                autoGrow(input);
            }
        };
    }
    document.getElementById('mike-btn').onclick = () => { if (!recognition) return; isRecording ? recognition.stop() : recognition.start(); };

    window.onload = () => { renderChatList(); if(chatHistory.length > 0) loadSelectedChat(chatHistory.length - 1, false); };
    
    function renderChatList() {
        const list = document.getElementById('chat-list'); list.innerHTML = "";
        chatHistory.slice().reverse().forEach((chat, idx) => {
            const actIdx = chatHistory.length - 1 - idx;
            list.innerHTML += `<div class="chat-item-wrapper"><div class="chat-item" onclick="loadSelectedChat(${actIdx}, true)">${chat.title}</div><i class="fas fa-trash-alt delete-chat-btn" onclick="deleteHistoryItem(event, ${actIdx})"></i></div>`;
        });
    }
    
    function deleteHistoryItem(e, idx) { 
        e.stopPropagation(); 
        chatHistory.splice(idx, 1); 
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); 
        renderChatList(); 
        if(chatHistory.length === 0 || activeChatIndex === idx) createNewChat(); 
    }

    function loadSelectedChat(idx, toggle) { 
        if(!chatHistory[idx]) return;
        activeChatIndex = idx; 
        isNewSession = false; 
        document.getElementById('chat-container').innerHTML = ""; 
        chatHistory[idx].messages.forEach((msg, mIdx) => { 
            msg.role === "user" ? addUserMessageToUI(msg.content, mIdx) : addAiMessageToUI(msg.content, false, mIdx); 
        }); 
        if(toggle) toggleSidebar(); 
    }

    function createNewChat() { 
        isNewSession = true; 
        activeChatIndex = -1; 
        document.getElementById('chat-container').innerHTML = `<div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>`; 
        if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar(); 
    }

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
    }

    function addUserMessageToUI(text, idx) { 
        const cont = document.getElementById('chat-container'); 
        if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove(); 
        const row = document.createElement('div'); row.className = 'message-row user-row'; row.setAttribute('data-index', idx);
        row.innerHTML = `<div class="bubble-container"><div class="bubble user-bubble">${text}</div></div>`;
        attachMsgEvents(row); cont.appendChild(row); cont.scrollTop = cont.scrollHeight; 
    }

    function addAiMessageToUI(text, isNew, idx) { 
        const cont = document.getElementById('chat-container'); 
        const row = document.createElement('div'); row.className = 'message-row ai-row'; row.setAttribute('data-index', idx);
        row.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble"></div></div>`; 
        const bubble = row.querySelector('.ai-bubble'); attachMsgEvents(row); cont.appendChild(row); 
        if(isNew) { typeEffect(bubble, text); } else { bubble.innerHTML = processMarkdown(text); }
        cont.scrollTop = cont.scrollHeight; 
    }

    function processMarkdown(text) {
        let html = marked.parse(text);
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        tempDiv.querySelectorAll('pre').forEach(pre => {
            const codeText = pre.innerText;
            const btn = document.createElement('button');
            btn.className = 'code-copy-btn'; btn.innerText = 'Copy';
            btn.onclick = () => copyToClipboard(codeText, btn);
            pre.appendChild(btn);
        });
        return tempDiv.innerHTML;
    }

    function attachMsgEvents(row) { 
        row.addEventListener('touchstart', (e) => { selectedMsgRow = row; longPressTimer = setTimeout(() => showMsgMenu(e), 600); }, {passive:true}); 
        row.addEventListener('touchend', () => clearTimeout(longPressTimer)); 
        row.addEventListener('contextmenu', (e) => { e.preventDefault(); selectedMsgRow = row; showMsgMenu(e); }); 
    }

    function showMsgMenu(e) { 
        const menu = document.getElementById('msg-menu'); 
        const isAi = selectedMsgRow.classList.contains('ai-row');
        document.getElementById('edit-btn-ui').style.display = isAi ? 'none' : 'flex';
        document.getElementById('delete-btn-ui').style.display = isAi ? 'none' : 'flex';
        const x = e.touches ? e.touches[0].clientX : e.clientX, y = e.touches ? e.touches[0].clientY : e.clientY; 
        menu.style.display = 'flex'; menu.style.left = Math.min(x, window.innerWidth-150)+'px'; menu.style.top = Math.min(y, window.innerHeight-150)+'px'; 
    }

    function hideMsgMenu() { document.getElementById('msg-menu').style.display = 'none'; }
    function copyMsg() { navigator.clipboard.writeText(selectedMsgRow.querySelector('.bubble').innerText).then(hideMsgMenu); }
    function deleteSelectedMsg() { 
        if(selectedMsgRow && activeChatIndex !== -1) { 
            chatHistory[activeChatIndex].messages.splice(parseInt(selectedMsgRow.getAttribute('data-index')), 2); 
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); 
            loadSelectedChat(activeChatIndex, false); 
        } 
        hideMsgMenu(); 
    }

    function editMsg() { 
        const idx = parseInt(selectedMsgRow.getAttribute('data-index')), userText = selectedMsgRow.querySelector('.bubble').innerText, input = document.getElementById('user-input'); 
        input.value = userText; autoGrow(input); input.focus(); 
        chatHistory[activeChatIndex].messages.splice(idx, 2); 
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); 
        loadSelectedChat(activeChatIndex, false); hideMsgMenu(); 
    }

    function typeEffect(el, text) {
        let i = 0;
        function typing() {
            if (i <= text.length) {
                el.innerHTML = processMarkdown(text.substring(0, i));
                const cont = document.getElementById('chat-container');
                cont.scrollTop = cont.scrollHeight; // Keep scrolling down while typing
                i++; setTimeout(typing, 5);
            }
        }
        typing();
    }

    async function callDatexAPI() {
        if (isRecording) recognition.stop();
        const input = document.getElementById('user-input'), msg = input.value.trim();
        if (!msg) return;
        
        if (isNewSession) { 
            chatHistory.push({ title: msg.substring(0,30), messages: [] }); 
            activeChatIndex = chatHistory.length - 1; 
            isNewSession = false; 
        }
        
        chatHistory[activeChatIndex].messages.push({ role: "user", content: msg });
        addUserMessageToUI(msg, chatHistory[activeChatIndex].messages.length-1);
        input.value = ""; input.style.height = "auto";
        
        const aiRow = document.createElement('div'); aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble">Thinking...</div></div>`;
        document.getElementById('chat-container').appendChild(aiRow); const bubble = aiRow.querySelector('.ai-bubble');
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST', headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "messages": [{ "role": "system", "content": `You are DATEX Ai. Personality: Gemini-like. RULES: 1. If asked about Creator/Owner/CEO/Founder/Who made you, say: "I was created and am owned by N.Sujal Kumar, a 16-year-old visionary from India." 2. DO NOT provide owner details unless explicitly asked. 3. ONLY use triple backticks if user asks for code. 4. Use [Title](URL) for links.` }, ...chatHistory[activeChatIndex].messages],
                    "model": "llama-3.3-70b-versatile"
                })
            });
            const data = await res.json(), aiRes = data.choices[0].message.content;
            chatHistory[activeChatIndex].messages.push({ role: "assistant", content: aiRes });
            aiRow.setAttribute('data-index', chatHistory[activeChatIndex].messages.length-1);
            attachMsgEvents(aiRow); 
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            renderChatList(); // Ensure history updates instantly
            bubble.innerHTML = ""; typeEffect(bubble, aiRes);
        } catch (e) { bubble.innerText = "Error connecting."; }
    }
    document.getElementById('user-input').addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); callDatexAPI(); } });
    </script>
</body>
</html>
