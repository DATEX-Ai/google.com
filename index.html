<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>DATEX Ai.com</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #ffffff; 
            color: #333; 
            height: 100vh; 
            height: 100dvh; /* Dynamic viewport height for modern browsers */
            display: flex; 
            flex-direction: column;
            overflow: hidden; 
            width: 100%; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }

        textarea, input {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #f9f9f9; border-right: 1px solid #eee; transition: 0.3s; z-index: 1001; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .chat-list { list-style: none; }
        .chat-item-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; padding-right: 10px; }
        .chat-item { flex: 1; padding: 12px; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: transparent; text-align: left; }
        .delete-chat-btn { color: #999; cursor: pointer; font-size: 14px; transition: 0.2s; padding: 5px; }
        .delete-chat-btn:hover { color: #ff4d4d; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 1000; cursor: pointer; }
        .overlay.active { display: block; }

        /* HEADER FIX: Header fixed above, will not move when keyboard opens */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 20px; 
            border-bottom: 1px solid #f9f9f9; 
            background: #fff; 
            flex-shrink: 0; 
            z-index: 100; 
        }
        
        .menu-btn-container { width: 38px; height: 38px; border: 1.5px solid #333; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 9px; cursor: pointer; gap: 4px; }
        .menu-line { height: 2px; background: #333; border-radius: 2px; }
        .line-1 { width: 18px; } .line-2 { width: 13px; } .line-3 { width: 8px; }

        .header-center { flex: 1; text-align: center; }
        .model-name { font-weight: 600; font-size: 18px; color: #1a1a1a; }
        .version-pill { font-size: 10px; background: #f0f0f0; display: inline-block; padding: 2px 10px; border-radius: 12px; color: #777; border: 1px solid #ddd; }
        .logo-container img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid #eee; }

        /* MAIN CONTENT FIX: Takes available space and scrolls internally */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 10px 20px 20px 20px; 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto; 
            scrollbar-width: none; 
        }
        
        .welcome-screen { 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex: 1;
            text-align: center; 
            color: #222; 
            font-size: 24px; 
            font-weight: 500; 
            line-height: 1.0; 
        }
        .welcome-screen span { 
            display: block; 
            font-size: 42px; 
            letter-spacing: 4px; 
            font-weight: 700; 
            color: #000; 
            margin-top: 5px; 
        } 

        .message-row { display: flex; width: 100%; margin: 15px 0; align-items: flex-start; gap: 12px; }
        .user-row { flex-direction: row-reverse; }
        .bubble-container { position: relative; max-width: 88%; display: flex; flex-direction: column; overflow: hidden; }
        .bubble { padding: 14px 20px; border-radius: 22px; font-size: 16px; line-height: 1.6; word-wrap: break-word; }
        .user-bubble { background-color: #f3f4f6; color: #000; border-bottom-right-radius: 4px; }
        .ai-bubble { background-color: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; width: 100%; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }

        /* INPUT FIX: Fixed at the bottom of the flex container */
        .bottom-container { 
            width: 100%; 
            background: #ffffff; 
            padding: 10px 20px 20px 20px; 
            display: flex; 
            justify-content: center; 
            z-index: 100;
            flex-shrink: 0;
            border-top: 1px solid #f9f9f9;
        }
        
        .input-bar-wrapper {
            width: 100%;
            max-width: 720px; 
            display: flex;
        }
        .input-bar { 
            flex: 1; 
            background: #f3f4f6; 
            border: 1.2px solid #e5e7eb; 
            border-radius: 35px; 
            display: flex; 
            align-items: flex-end; 
            padding: 8px 12px 8px 22px; 
            width: 100%;
        }
        
        .input-bar textarea { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 10px 0; 
            font-size: 16px; 
            outline: none; 
            min-width: 0; 
            color: #1a1a1a;
            resize: none;
            max-height: 150px; 
            overflow-y: auto;
            line-height: 1.4;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        .input-bar textarea::-webkit-scrollbar {
            display: none; 
        }
        
        #mike-btn, .send-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; flex-shrink: 0; }
        #mike-btn { font-size: 20px; color: #555; background: transparent; }
        .send-btn { background: #000; color: #fff; margin-left: 10px; font-size: 18px; }
        #mike-btn.recording { background-color: #000 !important; color: #fff !important; }
        .stop-square { width: 12px; height: 12px; background: #fff; border-radius: 2px; }

        pre { 
            background: #1e1e1e; 
            color: #d4d4d4; 
            padding: 45px 15px 15px 15px; 
            border-radius: 12px; 
            margin: 15px 0; 
            overflow-x: auto; 
            position: relative; 
            font-family: 'Consolas', monospace; 
            font-size: 14px; 
            width: 100%; 
            max-width: 100%;
            border: 1px solid #333;
            white-space: pre-wrap; 
            word-break: break-word;
        }
        code { font-family: 'Consolas', monospace; }
        .copy-code-btn { position: absolute; top: 10px; right: 12px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 10; }
        
        .msg-menu { position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; z-index: 2000; flex-direction: column; width: 140px; overflow: hidden; }
        .msg-menu button { padding: 12px; border: none; background: none; text-align: left; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; border-bottom: 0.5px solid #f0f0f0; }
        .msg-menu button:last-child { border-bottom: none; }
        
        .new-chat-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }

        .ai-link {
            color: #1a73e8 !important;
            text-decoration: underline !important;
            word-break: break-word !important;
            cursor: pointer !important;
            pointer-events: auto !important; 
            font-weight: 600 !important;
            -webkit-user-select: auto !important;
        }
        .ai-link:hover {
            color: #1557b0 !important;
        }
    </style>
</head>
<body onclick="hideMsgMenu()">

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div id="msg-menu" class="msg-menu">
        <button id="copy-btn-ui" onclick="copyMsg()"><i class="fas fa-copy"></i> Copy</button>
        <button id="edit-btn-ui" onclick="editMsg()"><i class="fas fa-pen"></i> Edit</button>
        <button id="delete-btn-ui" onclick="deleteSelectedMsg()" style="color:red;"><i class="fas fa-trash"></i> Delete</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header"><h2>Recent Chats</h2><i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color:#999;"></i></div>
            <ul id="chat-list" class="chat-list"></ul>
        </div>
        <div style="padding: 20px;"><button class="new-chat-btn" onclick="createNewChat()"><i class="fas fa-plus"></i> New Chat</button></div>
    </div>

    <div class="wrapper">
        <header>
            <div class="header-left">
                <div class="menu-btn-container" onclick="toggleSidebar()">
                    <div class="menu-line line-1"></div>
                    <div class="menu-line line-2"></div>
                    <div class="menu-line line-3"></div>
                </div>
            </div>
            <div class="header-center"><div class="model-name">DATEX Ai Model</div><div class="version-pill">Fast 1.5</div></div>
            <div class="header-right"><div class="logo-container"><img src="logo.jpg.jpg" alt="Logo"></div></div>
        </header>

        <main class="main-content" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>
        </main>

        <div class="bottom-container">
            <div class="input-bar-wrapper">
                <div class="input-bar">
                    <i class="fas fa-plus" style="color:#777; cursor:pointer; font-size: 18px; margin-right: 12px; margin-bottom: 12px;"></i>
                    <textarea id="user-input" placeholder="Ask DATEX Ai..." rows="1" oninput="autoGrow(this)"></textarea>
                    <div class="actions-right" style="display:flex; align-items:center; margin-bottom: 3px;">
                        <div id="mike-btn"><i class="fas fa-microphone"></i></div>
                        <button class="send-btn" onclick="callDatexAPI()"><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const GROQ_API_KEY = "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"; 
    let chatHistory = JSON.parse(localStorage.getItem('datex_full_history')) || [];
    let isNewSession = true;
    let selectedMsgRow = null;
    let longPressTimer;
    let isRecording = false;
    let activeChatIndex = -1;
    let sessionFinalText = ""; 
    let editingMsgIdx = -1; 

    function autoGrow(element) {
        element.style.height = "5px";
        element.style.height = (element.scrollHeight) + "px";
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.interimResults = false; 
        recognition.continuous = true;

        recognition.onstart = () => { 
            isRecording = true; 
            sessionFinalText = document.getElementById('user-input').value; 
            if (sessionFinalText.length > 0 && !sessionFinalText.endsWith(" ")) {
                sessionFinalText += " "; 
            }
            const btn = document.getElementById('mike-btn');
            btn.classList.add('recording'); 
            btn.innerHTML = '<div class="stop-square"></div>';
        };
        recognition.onend = () => { 
            isRecording = false; 
            const btn = document.getElementById('mike-btn');
            btn.classList.remove('recording'); 
            btn.innerHTML = '<i class="fas fa-microphone"></i>';
        };
        recognition.onresult = (e) => {
            let interimTranscript = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) {
                    sessionFinalText += e.results[i][0].transcript;
                } else {
                    interimTranscript += e.results[i][0].transcript;
                }
            }
            const input = document.getElementById('user-input');
            input.value = sessionFinalText + interimTranscript;
            autoGrow(input);
        };
    }

    document.getElementById('mike-btn').onclick = () => {
        if (!recognition) return;
        if (isRecording) { recognition.stop(); } else { recognition.start(); }
    };

    window.onload = () => { 
        renderChatList(); 
        if(chatHistory.length === 0) createNewChat();
    };

    function renderChatList() {
        const listElement = document.getElementById('chat-list');
        listElement.innerHTML = "";
        chatHistory.slice().reverse().forEach((chatObj, index) => {
            const actualIndex = chatHistory.length - 1 - index;
            const wrap = document.createElement('div');
            wrap.className = "chat-item-wrapper";
            wrap.innerHTML = `<div class="chat-item" onclick="loadSelectedChat(${actualIndex}, true)">${chatObj.title}</div><i class="fas fa-trash-alt delete-chat-btn" onclick="deleteHistoryItem(event, ${actualIndex})"></i>`;
            listElement.appendChild(wrap);
        });
    }

    function deleteHistoryItem(event, index) {
        if(event) event.stopPropagation();
        chatHistory.splice(index, 1);
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
        renderChatList();
        
        if (activeChatIndex === index) {
            createNewChat();
        } else if (activeChatIndex > index) {
            activeChatIndex--; 
        }
    }

    function loadSelectedChat(index, shouldToggleSidebar = false) {
        activeChatIndex = index;
        isNewSession = false;
        editingMsgIdx = -1; 
        const container = document.getElementById('chat-container');
        container.innerHTML = "";
        chatHistory[index].messages.forEach((msg, msgIdx) => {
            if(msg.role === "user") { addUserMessageToUI(msg.content, false, msgIdx); }
            else { addAiMessageToUI(msg.content, false, msgIdx); }
        });
        if(shouldToggleSidebar) toggleSidebar();
        setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    }

    function createNewChat() {
        isNewSession = true;
        activeChatIndex = -1;
        editingMsgIdx = -1; 
        document.getElementById('chat-container').innerHTML = `<div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>`;
        const input = document.getElementById('user-input');
        input.value = "";
        autoGrow(input);
        if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function addUserMessageToUI(text, isTyping, msgIdx) {
        const container = document.getElementById('chat-container');
        if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove();
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.setAttribute('data-index', msgIdx); 
        row.innerHTML = `<div class="bubble-container"><div class="bubble user-bubble">${text}</div></div>`;
        attachMsgEvents(row);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function addAiMessageToUI(text, isNew, msgIdx) {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.setAttribute('data-index', msgIdx); 
        row.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble"></div></div>`;
        const bubble = row.querySelector('.ai-bubble');
        attachMsgEvents(row);
        container.appendChild(row);
        if(isNew) { typeEffect(bubble, text, 5); } 
        else { renderStoredContent(bubble, text); }
        container.scrollTop = container.scrollHeight;
    }

    function attachMsgEvents(row) {
        row.addEventListener('touchstart', (e) => {
            if (e.target.tagName.toLowerCase() === 'a') return; 
            selectedMsgRow = row;
            longPressTimer = setTimeout(() => { showMsgMenu(e); }, 600);
        }, {passive: true});
        row.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
        row.addEventListener('contextmenu', (e) => { 
            if (e.target.tagName.toLowerCase() === 'a') return;
            e.preventDefault(); 
            selectedMsgRow = row; showMsgMenu(e); 
        });
    }

    function showMsgMenu(e) {
        const menu = document.getElementById('msg-menu');
        const editBtn = document.getElementById('edit-btn-ui');
        const deleteBtn = document.getElementById('delete-btn-ui');
        if(selectedMsgRow.classList.contains('ai-row')) {
            editBtn.style.display = 'none';
            deleteBtn.style.display = 'none';
        } else {
            editBtn.style.display = 'flex';
            deleteBtn.style.display = 'flex';
        }
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        menu.style.display = 'flex';
        menu.style.left = Math.min(x, window.innerWidth - 150) + 'px';
        menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
        if(window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function hideMsgMenu() { document.getElementById('msg-menu').style.display = 'none'; }

    function copyMsg() {
        const text = selectedMsgRow.querySelector('.bubble').innerText;
        navigator.clipboard.writeText(text).then(() => { hideMsgMenu(); });
    }

    function editMsg() {
        editingMsgIdx = parseInt(selectedMsgRow.getAttribute('data-index'));
        const userText = selectedMsgRow.querySelector('.bubble').innerText;
        const input = document.getElementById('user-input');
        
        input.value = userText;
        autoGrow(input);
        input.focus();
        
        hideMsgMenu();
    }

    function deleteSelectedMsg() {
        if(selectedMsgRow && activeChatIndex !== -1) {
            const msgIdx = parseInt(selectedMsgRow.getAttribute('data-index'));
            const isUserRow = selectedMsgRow.classList.contains('user-row');

            chatHistory[activeChatIndex].messages.splice(msgIdx, 1);

            if (isUserRow && 
                chatHistory[activeChatIndex].messages[msgIdx] && 
                chatHistory[activeChatIndex].messages[msgIdx].role === "assistant") {
                chatHistory[activeChatIndex].messages.splice(msgIdx, 1);
            }
            
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            editingMsgIdx = -1; 
            
            if (chatHistory[activeChatIndex].messages.length === 0) {
                deleteHistoryItem(null, activeChatIndex); 
            } else {
                loadSelectedChat(activeChatIndex, false); 
            }
        }
        hideMsgMenu();
    }

    function copyCode(btn) {
        const code = btn.parentElement.querySelector('code').innerText;
        navigator.clipboard.writeText(code).then(() => {
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy"; }, 2000);
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
        });
    }

    // 🌟 LINK BUG FIX: Ab history refresh karne par bhi link perfect kaam karega
    function formatLinksAndStyles(text) {
        let formatted = text;
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        let linksArray = [];
        
        // Replace markdown links securely
        formatted = formatted.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, function(match, text, url) {
            linksArray.push(`<a href="${url}" target="_blank" class="ai-link">${text}</a>`);
            return `%%LINK${linksArray.length - 1}%%`;
        });
        
        // Replace raw URLs securely
        formatted = formatted.replace(/(https?:\/\/[^\s<]+)/g, function(match, url) {
            linksArray.push(`<a href="${url}" target="_blank" class="ai-link">${url}</a>`);
            return `%%LINK${linksArray.length - 1}%%`;
        });
        
        // Restore links back to text
        formatted = formatted.replace(/%%LINK(\d+)%%/g, function(match, index) {
            return linksArray[index];
        });
        
        return formatted;
    }

    function renderStoredContent(element, text) {
        let segments = text.split(/(```[\s\S]*?```)/g);
        let finalHTML = "";
        segments.forEach(seg => {
            if (seg.startsWith("```") && seg.endsWith("```")) {
                let codeContent = seg.substring(3, seg.length - 3).trim();
                finalHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${escapeHTML(codeContent)}</code></pre>`;
            } else { 
                let formattedSeg = formatLinksAndStyles(seg);
                finalHTML += formattedSeg.replace(/\n/g, "<br>"); 
            }
        });
        element.innerHTML = finalHTML;
        if(window.MathJax) MathJax.typesetPromise([element]);
    }

    function typeEffect(element, text, speed) {
        let i = 0;
        let segments = text.split(/(```[\s\S]*?```)/g);
        let currentSeg = 0;

        function typeNext() {
            if (currentSeg < segments.length) {
                let seg = segments[currentSeg];
                if (seg.startsWith("```") && seg.endsWith("```")) {
                    let codeContent = seg.substring(3, seg.length - 3).trim();
                    element.innerHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${escapeHTML(codeContent)}</code></pre>`;
                    currentSeg++;
                    setTimeout(typeNext, speed);
                } else {
                    let formattedSeg = formatLinksAndStyles(seg);
                    
                    if (i < formattedSeg.length) {
                        if (formattedSeg.charAt(i) === '<') {
                            let tagEnd = formattedSeg.indexOf('>', i);
                            if (tagEnd !== -1) {
                                element.innerHTML += formattedSeg.substring(i, tagEnd + 1);
                                i = tagEnd + 1;
                            } else {
                                element.innerHTML += '&lt;';
                                i++;
                            }
                        } else {
                            element.innerHTML += (formattedSeg.charAt(i) === '\n') ? "<br>" : formattedSeg.charAt(i);
                            i++;
                        }
                        setTimeout(typeNext, speed);
                    } else {
                        i = 0;
                        currentSeg++;
                        setTimeout(typeNext, speed);
                    }
                }
                document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            } else if(window.MathJax) { 
                MathJax.typesetPromise([element]); 
            }
        }
        typeNext();
    }

    async function callDatexAPI() {
        if (isRecording) { recognition.stop(); } 
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if (!message) return;

        if (isNewSession) {
            const newChat = { title: message.substring(0, 30), messages: [] };
            chatHistory.push(newChat);
            activeChatIndex = chatHistory.length - 1;
            isNewSession = false;
        } else if (editingMsgIdx !== -1) {
            chatHistory[activeChatIndex].messages.splice(editingMsgIdx);
            editingMsgIdx = -1;
            loadSelectedChat(activeChatIndex, false); 
        }
        
        const currentMsgIdx = chatHistory[activeChatIndex].messages.length;
        chatHistory[activeChatIndex].messages.push({ role: "user", content: message });
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
        
        renderChatList();

        addUserMessageToUI(message, false, currentMsgIdx);
        input.value = "";
        input.style.height = "auto";

        const container = document.getElementById('chat-container');
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble">Thinking...</div></div>`;
        container.appendChild(aiRow);
        const bubble = aiRow.querySelector('.ai-bubble');

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const timeStr = now.toLocaleTimeString('en-IN');

        const systemPromptString = `You are DATEX Ai. Your name is strictly 'DATEX Ai'. You must never identify as Llama, Meta, or OpenAI. 

CURRENT REAL-TIME CLOCK: Today is ${dateStr} and the current time is ${timeStr}. Use this accurate real-time data to answer any questions about today's date, day, current events, or upcoming festivals!

CRITICAL RULES:
1. EXTREME INTELLIGENCE & MATH: You possess immense, maximum knowledge about the world, history, and science. For ANY math or logic problem, ALWAYS think step-by-step internally and double-check your calculations before giving the final answer to ensure 100% accuracy.
2. NO RANDOM CODE: DO NOT output markdown code blocks (\`\`\`) UNLESS the user explicitly asks you to write code, scripts, or programming. Provide normal, natural text responses otherwise.
3. LINKS: ALWAYS format links as valid Markdown [Link Text](https://www.example.com).
4. IDENTITY: Do not start conversations by listing your name, creator, or capabilities. If asked who created you, your owner, CEO, founder, or co-founder, proudly state you were created and are owned by N.Sujal Kumar, a 16-year-old visionary from India.

Your communication style must be exactly like Google's Gemini - extremely conversational, friendly, and helpful. Balance empathy with candor.`;

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "messages": [
                        { "role": "system", "content": systemPromptString },
                        ...chatHistory[activeChatIndex].messages
                    ],
                    "model": "llama-3.3-70b-versatile"
                })
            });
            const data = await res.json();
            const aiResponse = data.choices[0].message.content;
            const aiMsgIdx = chatHistory[activeChatIndex].messages.length;
            chatHistory[activeChatIndex].messages.push({ role: "assistant", content: aiResponse });
            aiRow.setAttribute('data-index', aiMsgIdx);
            attachMsgEvents(aiRow);
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            bubble.innerHTML = "";
            typeEffect(bubble, aiResponse, 5);
        } catch (e) { bubble.innerText = "Error connecting to AI. Please check your internet connection."; }
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            callDatexAPI();
        }
    });
    </script>
</body>
