    <script>
    const dbName = "DATEX_AI_DB";
    const storeName = "ChatHistory";
    let db;

    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(storeName)) {
            db.createObjectStore(storeName);
        }
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        initApp();
    };

    function saveHistoryToDB() {
        if (!db) return;
        const tx = db.transaction(storeName, "readwrite");
        const store = tx.objectStore(storeName);
        store.put(chatHistory, "full_history");
    }

    function loadHistoryFromDB() {
        return new Promise((resolve) => {
            if (!db) return resolve([]);
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.get("full_history");
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => resolve([]);
        });
    }

    let chatHistory = [];
    async function initApp() {
        chatHistory = await loadHistoryFromDB();
        renderChatList();
        if(chatHistory.length === 0) createNewChat();
    }

    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
            e.preventDefault();
        }
    });

    if (window.visualViewport) {
        const resizeHandler = () => {
            document.body.style.height = window.visualViewport.height + 'px';
            window.scrollTo(0, 0);
            setTimeout(() => {
                const container = document.getElementById('chat-container');
                container.scrollTop = container.scrollHeight;
            }, 50);
        };
        window.visualViewport.addEventListener('resize', resizeHandler);
        resizeHandler();
    }

    document.getElementById('user-input').addEventListener('focus', () => {
        setTimeout(() => {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }, 300);
    });

    const GROQ_API_KEY = "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"; 
    const TAVILY_API_KEY = "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"; 

    let isNewSession = true;
    let selectedMsgRow = null;
    let isRecording = false;
    let activeChatIndex = -1;
    let sessionFinalText = ""; 
    let editingMsgIdx = -1; 
    let isGenerating = false;
    let stopGenerationFlag = false;
    let abortController = null;
    let currentAiRow = null;
    
    // NEW: ARRAY TO HOLD UP TO 10 FILES
    let currentAttachments = [];

    document.getElementById('chat-container').addEventListener('scroll', () => {
        if(document.getElementById('msg-menu').style.display === 'flex') hideMsgMenu();
    });

    function toggleAttachmentMenu(e) {
        if(e) e.stopPropagation();
        const menu = document.getElementById('attachment-menu');
        const overlay = document.getElementById('attachment-overlay');
        menu.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    function triggerCamera() { document.getElementById('camera-input').click(); toggleAttachmentMenu(); }
    function triggerGallery() { document.getElementById('gallery-input').click(); toggleAttachmentMenu(); }
    function triggerFiles() { document.getElementById('file-input').click(); toggleAttachmentMenu(); }

    // --- MASTER FIX: REVERTED COMPRESSION & ALLOW 10 FILES ---
    function handleFileSelect(event) {
        const files = event.target.files;
        if(!files || files.length === 0) return;

        for (let i = 0; i < files.length; i++) {
            if (currentAttachments.length >= 10) {
                alert("Maximum 10 files allowed!");
                break;
            }

            const file = files[i];
            if (file.type.startsWith('video/')) {
                alert("Videos are not allowed!");
                continue;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                if (file.type.startsWith('image/')) {
                    // COMPRESSION RESTORED to prevent 405/413 crashes!
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; // Good HD quality
                        const scaleSize = Math.min(1, MAX_WIDTH / img.width);
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);

                        currentAttachments.push({ type: 'image', name: file.name, data: compressedBase64 });
                        renderAttachmentPreview();
                    }
                    img.src = e.target.result;
                } else {
                    currentAttachments.push({ type: 'file', name: file.name, data: null });
                    renderAttachmentPreview();
                }
            }
            reader.readAsDataURL(file);
        }
        event.target.value = '';
    }

    function renderAttachmentPreview() {
        const container = document.getElementById('attachment-preview-container');
        container.innerHTML = '';
        if (currentAttachments.length === 0) {
            container.style.display = 'none';
            return;
        }
        container.style.display = 'flex';
        currentAttachments.forEach((att, index) => {
            const chip = document.createElement('div');
            chip.className = 'attachment-chip';
            const removeBtn = document.createElement('div');
            removeBtn.className = 'remove-btn';
            removeBtn.innerHTML = '<i class="fas fa-times"></i>';
            removeBtn.onclick = () => removeAttachment(index);
            if (att.type === 'image') {
                chip.innerHTML = `<img src="${att.data}">`;
            } else {
                chip.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center;"><i class="fas fa-file-alt" style="font-size:24px; color:#1a73e8;"></i><span style="font-size:9px; margin-top:4px; max-width:55px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${att.name}</span></div>`;
            }
            chip.appendChild(removeBtn);
            container.appendChild(chip);
        });
    }

    function removeAttachment(index) {
        currentAttachments.splice(index, 1);
        renderAttachmentPreview();
    }
    // --------------------------------------------------------

    function autoGrow(element) {
        element.style.height = "44px"; 
        if (element.scrollHeight > 44) element.style.height = (element.scrollHeight) + "px";
    }

    function renderChatList() {
        const listElement = document.getElementById('chat-list');
        listElement.innerHTML = "";
        chatHistory.slice().reverse().forEach((chatObj, index) => {
            const actualIndex = chatHistory.length - 1 - index;
            const wrap = document.createElement('div');
            wrap.className = "chat-item-wrapper";
            wrap.innerHTML = `<div class="chat-item" onclick="loadSelectedChat(${actualIndex}, true)">${chatObj.title}</div><i class="fas fa-trash-alt delete-chat-btn" onclick="deleteHistoryItem(event, ${actualIndex})"></i>`;
            listElement.appendChild(wrap);
        });
    }

    function deleteHistoryItem(event, index) {
        if(event) event.stopPropagation();
        chatHistory.splice(index, 1);
        saveHistoryToDB();
        renderChatList();
        if (activeChatIndex === index) createNewChat(true); else if (activeChatIndex > index) activeChatIndex--;
    }

    function loadSelectedChat(index, shouldToggleSidebar = false) {
        activeChatIndex = index;
        isNewSession = false;
        editingMsgIdx = -1; 
        const container = document.getElementById('chat-container');
        container.innerHTML = "";
        chatHistory[index].messages.forEach((msg, msgIdx) => {
            // Support backwards compatibility for single attachments
            let atts = msg.attachments ? msg.attachments : (msg.attachment ? [msg.attachment] : []);
            if(msg.role === "user") addUserMessageToUI(msg.content, false, msgIdx, atts);
            else addAiMessageToUI(msg.content, false, msgIdx);
        });
        if(shouldToggleSidebar) toggleSidebar();
    }

    function createNewChat(keepSidebarOpen = false) {
        isNewSession = true;
        activeChatIndex = -1;
        editingMsgIdx = -1; 
        document.getElementById('chat-container').innerHTML = `<div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX AI</span></div>`;
        const input = document.getElementById('user-input');
        input.value = "";
        autoGrow(input);
        if(!keepSidebarOpen && document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function cleanOldTags(text) {
        if(!text) return "";
        return text.replace(/\[Attached(?: File)?:.*?\]\n?/g, "").trim();
    }

    // --- SUPPORT FOR RENDERING MULTIPLE ATTACHMENTS IN CHAT ---
    function addUserMessageToUI(text, isTyping, msgIdx, attachments = []) {
        const container = document.getElementById('chat-container');
        if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove();
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.setAttribute('data-index', msgIdx); 
        let attachmentHTML = '';
        if (attachments && attachments.length > 0) {
            attachmentHTML = `<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">`;
            attachments.forEach(att => {
                if (att.type === 'image') {
                    attachmentHTML += `<img src="${att.data}" style="width: 80px; height: 80px; border-radius: 12px; object-fit: cover;">`;
                } else {
                    attachmentHTML += `<div style="display: flex; align-items: center; gap: 6px; background: #e5e7eb; padding: 6px 10px; border-radius: 12px;"><i class="fas fa-file-pdf" style="color: #1a73e8; font-size: 18px;"></i><span style="font-size: 11px; font-weight: 500; color:#333; max-width: 80px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${att.name}</span></div>`;
                }
            });
            attachmentHTML += `</div>`;
        }
        let cleanText = cleanOldTags(text);
        row.innerHTML = `<div class="bubble-container"><div class="bubble user-bubble" style="display: flex; flex-direction: column;">${attachmentHTML}${cleanText ? `<span>${cleanText}</span>` : ''}</div><div class="action-bar user-action-bar"><button class="action-btn" onclick="openMenu(event, this)"><i class="fas fa-ellipsis-v"></i></button></div></div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }
    // ----------------------------------------------------------

    function addAiMessageToUI(text, isNew, msgIdx) {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.setAttribute('data-index', msgIdx); 
        row.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble"></div></div>`;
        const bubble = row.querySelector('.ai-bubble');
        container.appendChild(row);
        if(isNew) typeEffect(bubble, text, 5); else { renderStoredContent(bubble, text); addAiActions(row, false); }
        container.scrollTop = container.scrollHeight;
    }

    function addAiActions(row, isStopped) {
        if (!row) return;
        const container = row.querySelector('.bubble-container');
        if (container && !container.querySelector('.action-bar')) {
            let html = `<div class="action-bar ai-action-bar">${isStopped ? `<button class="action-btn" onclick="regenerateMessage(this)"><i class="fas fa-redo"></i></button>` : ''}<button class="action-btn" onclick="openMenu(event, this)"><i class="fas fa-ellipsis-v"></i></button></div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
    }

    function openMenu(e, btn) {
        e.stopPropagation(); 
        const menu = document.getElementById('msg-menu');
        const row = btn.closest('.message-row');
        if (menu.style.display === 'flex' && selectedMsgRow === row) { hideMsgMenu(); return; }
        selectedMsgRow = row;
        const isUser = selectedMsgRow.classList.contains('user-row');
        document.getElementById('edit-btn-ui').style.display = isUser ? 'flex' : 'none';
        document.getElementById('delete-btn-ui').style.display = isUser ? 'flex' : 'none';
        const rect = btn.getBoundingClientRect();
        menu.style.left = isUser ? (rect.left - 140) + 'px' : (rect.right + 5) + 'px';
        menu.style.top = rect.top + 'px';
        menu.style.display = 'flex';
    }

    function hideMsgMenu() { document.getElementById('msg-menu').style.display = 'none'; }
    function copyMsg() { if(!selectedMsgRow) return; navigator.clipboard.writeText(selectedMsgRow.querySelector('.bubble').innerText).then(hideMsgMenu); }
    
    function editMsg() { 
        if(!selectedMsgRow) return; 
        editingMsgIdx = parseInt(selectedMsgRow.getAttribute('data-index')); 
        const msgObj = chatHistory[activeChatIndex].messages[editingMsgIdx];
        document.getElementById('user-input').value = cleanOldTags(msgObj.content); 
        autoGrow(document.getElementById('user-input')); 
        
        currentAttachments = msgObj.attachments ? [...msgObj.attachments] : (msgObj.attachment ? [msgObj.attachment] : []);
        renderAttachmentPreview();
        
        hideMsgMenu(); 
    }

    function deleteSelectedMsg() {
        if(selectedMsgRow && activeChatIndex !== -1) {
            const msgIdx = parseInt(selectedMsgRow.getAttribute('data-index'));
            chatHistory[activeChatIndex].messages.splice(msgIdx, 1);
            if (chatHistory[activeChatIndex].messages[msgIdx]?.role === "assistant") chatHistory[activeChatIndex].messages.splice(msgIdx, 1);
            saveHistoryToDB();
            if (chatHistory[activeChatIndex].messages.length === 0) deleteHistoryItem(null, activeChatIndex); else loadSelectedChat(activeChatIndex, false);
        }
        hideMsgMenu();
    }

    function formatLinksAndStyles(text) {
        let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="ai-link">$1</a>');
        return formatted.replace(/(^|\s)(https?:\/\/[^\s<()]+|www\.[^\s<()]+)/g, (m, s, url) => {
            let cleanUrl = url.replace(/[.,;!?)]$/, '');
            let fullUrl = cleanUrl.startsWith('www.') ? 'https://' + cleanUrl : cleanUrl;
            return s + '<a href="' + fullUrl + '" target="_blank" class="ai-link">' + cleanUrl + '</a>';
        });
    }

    function renderStoredContent(element, text) {
        let segments = text.split(/(```[\s\S]*?```)/g);
        element.innerHTML = segments.map(seg => {
            if (seg.startsWith("```")) {
                let code = seg.substring(3, seg.length - 3).trim();
                return `<pre><button class="copy-code-btn" onclick="copyCode(this)">Copy</button><code>${code.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]))}</code></pre>`;
            }
            return formatLinksAndStyles(seg).replace(/\n/g, "<br>");
        }).join("");
        if(window.MathJax) MathJax.typesetPromise([element]);
    }

    function typeEffect(element, text, speed) {
        let i = 0; let accumulatedHTML = ""; 
        function typeNext() {
            if (stopGenerationFlag) { resetSendButton(); addAiActions(currentAiRow, true); return; }
            if (i < text.length) {
                accumulatedHTML += (text.charAt(i) === '\n') ? "<br>" : text.charAt(i);
                element.innerHTML = formatLinksAndStyles(accumulatedHTML);
                i++; setTimeout(typeNext, speed);
                document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            } else { renderStoredContent(element, text); resetSendButton(); addAiActions(currentAiRow, false); }
        }
        typeNext();
    }

    function handleSendClick() { if (isGenerating) stopGeneration(); else callDatexAPI(); }
    function stopGeneration() { stopGenerationFlag = true; if (abortController) abortController.abort(); resetSendButton(); }
    function resetSendButton() { isGenerating = false; document.querySelector('.send-btn').innerHTML = '<i class="fas fa-arrow-up"></i>'; }

    async function callDatexAPI(isRegenerate = false) {
        let message = ""; let attachmentsToSave = [];
        if (!isRegenerate) {
            const input = document.getElementById('user-input');
            message = cleanOldTags(input.value.trim()); 
            attachmentsToSave = [...currentAttachments]; 
            currentAttachments = [];
            renderAttachmentPreview();
            
            if (!message && attachmentsToSave.length === 0) return;
            input.value = ""; input.style.height = "44px";
            
            if (isNewSession) { 
                chatHistory.push({ title: message ? message.substring(0, 30) : "Media Chat", messages: [] }); 
                activeChatIndex = chatHistory.length - 1; 
                isNewSession = false; 
            }
            const msgObj = { role: "user", content: message }; 
            if (attachmentsToSave.length > 0) msgObj.attachments = attachmentsToSave;
            
            chatHistory[activeChatIndex].messages.push(msgObj);
            saveHistoryToDB(); 
            renderChatList(); 
            addUserMessageToUI(message, false, chatHistory[activeChatIndex].messages.length - 1, attachmentsToSave);
        } else {
            message = chatHistory[activeChatIndex].messages.at(-1).content;
        }

        isGenerating = true; stopGenerationFlag = false;
        document.querySelector('.send-btn').innerHTML = '<div class="stop-square"></div>';
        const container = document.getElementById('chat-container');
        const aiRow = document.createElement('div'); aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble">Thinking...</div></div>`;
        container.appendChild(aiRow); currentAiRow = aiRow;

        let useVision = false;
        let apiMessages = [{ "role": "system", "content": "You are DATEX AI. You have Vision. Analyse images strictly. Safety ON." }];
        
        const totalMsgs = chatHistory[activeChatIndex].messages.length;
        
        chatHistory[activeChatIndex].messages.forEach((msg, idx) => {
            const isLastMessage = (idx === totalMsgs - 1);
            let atts = msg.attachments ? msg.attachments : (msg.attachment ? [msg.attachment] : []);
            
            if (msg.role === 'user') {
                if (atts.length > 0) {
                    let hasImage = false;
                    let contentArray = [];
                    
                    if (isLastMessage) {
                        let imgCount = 0;
                        contentArray.push({ type: "text", text: cleanOldTags(msg.content) || "Analyze the attached images." });
                        atts.forEach(att => {
                            if (att.type === 'image') {
                                if(imgCount < 5) { // Groq API allows max 5 images per request safely
                                    contentArray.push({ type: "image_url", image_url: { url: att.data } });
                                    useVision = true;
                                    imgCount++;
                                }
                                hasImage = true;
                            }
                        });
                        apiMessages.push({ role: 'user', content: contentArray });
                    } else {
                        // Loop Breaker: Never send old images to API. Saves bandwidth and stops 405 error!
                        apiMessages.push({ role: 'user', content: `[System Note: User attached files previously]\n${cleanOldTags(msg.content)}` });
                    }
                } else {
                    apiMessages.push({ role: 'user', content: cleanOldTags(msg.content) });
                }
            } else {
                apiMessages.push({ role: 'assistant', content: msg.content });
            }
        });

        abortController = new AbortController();
        try {
            const res = await fetch("[https://api.groq.com/openai/v1/chat/completions](https://api.groq.com/openai/v1/chat/completions)", {
                method: 'POST', headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' }, signal: abortController.signal,
                body: JSON.stringify({ "messages": apiMessages, "model": useVision ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile", "max_tokens": 4096 })
            });
            
            if (!res.ok) {
                let errMsg = `Server Error ${res.status}`;
                try {
                    const errData = await res.json();
                    errMsg = errData.error?.message || errMsg;
                } catch(e) {
                    errMsg = `API is currently overloaded or unavailable (Status ${res.status}). Please try again in a few seconds.`;
                }
                throw new Error(errMsg);
            }

            const data = await res.json();
            const aiResponse = data.choices[0].message.content;
            chatHistory[activeChatIndex].messages.push({ role: "assistant", content: aiResponse });
            saveHistoryToDB(); aiRow.querySelector('.ai-bubble').innerHTML = ""; typeEffect(aiRow.querySelector('.ai-bubble'), aiResponse, 5);
        } catch (e) { 
            if (e.name === 'AbortError') {
                aiRow.querySelector('.ai-bubble').innerText = "Generation stopped.";
            } else {
                aiRow.querySelector('.ai-bubble').innerText = e.message; 
            }
            resetSendButton(); addAiActions(currentAiRow, true);
        }
    }
    </script>
