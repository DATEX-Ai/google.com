<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATEX Ai.com</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; color: #333; height: 100vh; display: flex; overflow: hidden; }

        /* --- Sidebar --- */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #f9f9f9; border-right: 1px solid #eee; transition: 0.3s; z-index: 1001; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .chat-list { list-style: none; }
        .chat-item-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .chat-item { flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; background: #fff; border: 1px solid #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { color: #ff4d4d; cursor: pointer; padding: 5px; font-size: 14px; opacity: 0.5; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 1000; cursor: pointer; }
        .overlay.active { display: block; }

        /* --- Layout --- */
        .wrapper { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; background: #fff; }
        .menu-btn { font-size: 22px; cursor: pointer; color: #444; }
        .header-center { flex: 1; text-align: center; }
        .model-name { font-weight: 600; font-size: 18px; color: #1a1a1a; }
        .version-pill { font-size: 10px; background: #f0f0f0; display: inline-block; padding: 2px 10px; border-radius: 12px; color: #777; border: 1px solid #ddd; }
        .logo-container img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid #eee; }

        /* --- Chat Screen --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; scrollbar-width: none; }
        .welcome-screen { text-align: center; margin-top: 22vh; color: #222; }
        .welcome-screen span { display: block; font-size: 48px; letter-spacing: 5px; font-weight: 600; color: #000; }

        .message-row { display: flex; width: 100%; margin: 15px 0; align-items: flex-start; gap: 12px; }
        .user-row { flex-direction: row-reverse; }
        .bubble-container { position: relative; max-width: 78%; display: flex; flex-direction: column; }
        .user-row .bubble-container { align-items: flex-end; }
        .bubble { padding: 14px 20px; border-radius: 22px; font-size: 16px; line-height: 1.6; word-wrap: break-word; }
        .user-bubble { background-color: #f3f4f6; color: #000; border-bottom-right-radius: 4px; }
        .ai-bubble { background-color: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
        .msg-del-icon { font-size: 12px; color: #ccc; cursor: pointer; margin-top: 6px; visibility: hidden; }
        .message-row:hover .msg-del-icon { visibility: visible; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }

        /* --- Bottom Input (Fixed Alignment) --- */
        .bottom-container { padding: 25px 20px; background: #fff; display: flex; justify-content: center; }
        .input-bar { flex: 1; max-width: 720px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 35px; display: flex; align-items: center; padding: 6px 18px; }
        .plus-icon { color: #777; cursor: pointer; font-size: 18px; margin-right: 10px; }
        .input-bar input { flex: 1; background: transparent; border: none; padding: 12px; font-size: 16px; outline: none; }
        .actions-right { display: flex; align-items: center; gap: 15px; } /* Mike aur Send ke beech gap */
        #mike-btn { cursor: pointer; font-size: 18px; color: #555; display: flex; align-items: center; }
        .send-btn { background: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; border: none; cursor: pointer; }
        .new-chat-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>Recent Chats</h2>
                <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color:#999;"></i>
            </div>
            <ul id="chat-list" class="chat-list"></ul>
        </div>
        <div style="padding: 20px;"><button class="new-chat-btn" onclick="createNewChat()"><i class="fas fa-plus"></i> New Chat</button></div>
    </div>

    <div class="wrapper">
        <header>
            <div class="header-left"><i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i></div>
            <div class="header-center">
                <div class="model-name">DATEX Ai Model</div>
                <div class="version-pill">Fast 1.0</div>
            </div>
            <div class="header-right"><div class="logo-container"><img src="logo.jpg.jpg" alt="Logo"></div></div>
        </header>

        <main class="main-content" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX</span></div>
        </main>

        <div class="bottom-container">
            <div class="input-bar">
                <i class="fas fa-plus plus-icon"></i>
                <input type="text" id="user-input" placeholder="Ask DATEX anything..." autocomplete="off">
                <div class="actions-right">
                    <div id="mike-btn"><i class="fas fa-microphone"></i></div>
                    <button class="send-btn" onclick="callDatexAPI()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const GROQ_API_KEY = "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"; 
    let chatHistory = JSON.parse(localStorage.getItem('datex_recent_chats')) || [];
    let isNewSession = true;

    window.onload = () => { renderChatList(); };

    function renderChatList() {
        const listElement = document.getElementById('chat-list');
        listElement.innerHTML = "";
        chatHistory.forEach((chat, index) => {
            const wrap = document.createElement('div');
            wrap.className = "chat-item-wrapper";
            wrap.innerHTML = `<li class="chat-item" onclick="loadToInput('${chat}')">Chat ${index+1}: ${chat}</li>
                              <i class="fas fa-trash-alt delete-btn" onclick="deleteHistoryItem(${index})"></i>`;
            listElement.appendChild(wrap);
        });
    }

    function deleteHistoryItem(index) {
        if(confirm("Delete this history?")) {
            chatHistory.splice(index, 1);
            localStorage.setItem('datex_recent_chats', JSON.stringify(chatHistory));
            renderChatList();
        }
    }

    function loadToInput(msg) { document.getElementById('user-input').value = msg; toggleSidebar(); }

    function createNewChat() {
        isNewSession = true;
        document.getElementById('chat-container').innerHTML = `<div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX</span></div>`;
        toggleSidebar();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function deleteMessage(element) {
        element.closest('.message-row').remove();
        if (document.getElementById('chat-container').children.length === 0) createNewChat();
    }

    function typeEffect(element, text, speed = 12) {
        let i = 0; element.innerHTML = "";
        function typing() {
            if (i < text.length) {
                element.innerHTML += (text.charAt(i) === '\n') ? "<br>" : text.charAt(i);
                i++; setTimeout(typing, speed);
                const container = document.getElementById('chat-container');
                container.scrollTop = container.scrollHeight;
            }
        }
        typing();
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    const mikeBtn = document.getElementById('mike-btn');
    mikeBtn.onclick = () => {
        if (mikeBtn.classList.contains('recording')) { 
            recognition.stop(); mikeBtn.classList.remove('recording');
            mikeBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        } else {
            recognition.start(); mikeBtn.classList.add('recording');
            mikeBtn.innerHTML = `<div style="width:30px; height:30px; border:2px solid #222; border-radius:50%; display:flex; align-items:center; justify-content:center;"><div style="width:10px; height:10px; background:red; border-radius:2px;"></div></div>`;
        }
    };
    recognition.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };

    async function callDatexAPI() {
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if (!message) return;
        if (mikeBtn.classList.contains('recording')) { recognition.stop(); mikeBtn.classList.remove('recording'); mikeBtn.innerHTML = '<i class="fas fa-microphone"></i>'; }

        if (isNewSession) {
            chatHistory.push(message);
            localStorage.setItem('datex_recent_chats', JSON.stringify(chatHistory));
            renderChatList();
            isNewSession = false;
        }

        const container = document.getElementById('chat-container');
        if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove();

        const uRow = document.createElement('div');
        uRow.className = 'message-row user-row';
        uRow.innerHTML = `<div class="bubble-container"><div class="bubble user-bubble">${message}</div><i class="fas fa-trash-alt msg-del-icon" onclick="deleteMessage(this)"></i></div>`;
        container.appendChild(uRow);
        input.value = "";

        const aiRow = document.createElement('div');
        aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" class="avatar"><div class="bubble-container"><div class="bubble ai-bubble">Thinking...</div><i class="fas fa-trash-alt msg-del-icon" onclick="deleteMessage(this)"></i></div>`;
        container.appendChild(aiRow);
        const bubble = aiRow.querySelector('.ai-bubble');

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "messages": [
                        { 
                            "role": "system", 
                            "content": "Your name is DATEX. Rules: 1. If asked about creator/owner/CEO, credit N.Sujal Kumar (16, Odisha, India). 2. Be professional and smart like Gemini. 3. Use ONLY 2-3 relevant emojis in total for the entire response." 
                        },
                        { "role": "user", "content": message }
                    ],
                    "model": "llama-3.3-70b-versatile"
                })
            });
            const data = await res.json();
            typeEffect(bubble, data.choices[0].message.content);
        } catch (e) { bubble.innerText = "Error! Connection issue."; }
    }
    document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter') callDatexAPI(); };
    </script>
</body>
</html>
