<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DATEX Ai.com</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; color: #333; height: 100vh; display: flex; overflow: hidden; width: 100%; position: fixed; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #f9f9f9; border-right: 1px solid #eee; transition: 0.3s; z-index: 9000; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .chat-list { list-style: none; }
        .chat-item-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; padding-right: 10px; cursor: pointer; }
        .chat-item { flex: 1; padding: 12px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: transparent; text-align: left; pointer-events: none; }
        .delete-chat-btn { color: #999; cursor: pointer; font-size: 14px; padding: 10px; z-index: 9100; }
        .delete-chat-btn:hover { color: #ff4d4d; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 8500; }
        .overlay.active { display: block; }
        
        .wrapper { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; width: 100%; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; background: #fff; flex-shrink: 0; z-index: 1000; }
        .menu-btn-container { width: 38px; height: 38px; border: 1.5px solid #333; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 9px; cursor: pointer; gap: 4px; }
        .menu-line-1 { width: 18px; height: 2px; background: #333; }
        .menu-line-2 { width: 13px; height: 2px; background: #333; }
        .menu-line-3 { width: 8px; height: 2px; background: #333; }
        
        .header-center { flex: 1; text-align: center; }
        .model-name { font-weight: 600; font-size: 18px; color: #1a1a1a; }
        .version-pill { font-size: 10px; background: #f0f0f0; display: inline-block; padding: 2px 10px; border-radius: 12px; color: #777; border: 1px solid #ddd; margin-top: 2px; }
        .logo-container img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid #eee; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px 20px 150px 20px; width: 100%; max-width: 800px; margin: 0 auto; scrollbar-width: none; position: relative; z-index: 100; scroll-behavior: smooth; }
        
        .welcome-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; flex: 1; text-align: center; color: #222; font-size: 24px; font-weight: 500; }
        .welcome-screen span { display: block; font-size: 42px; letter-spacing: 4px; font-weight: 700; color: #000; margin-top: 5px; } 

        .message-row { display: flex; width: 100%; margin: 15px 0; align-items: flex-start; gap: 12px; }
        .user-row { flex-direction: row-reverse; }
        .bubble { padding: 14px 20px; border-radius: 22px; font-size: 16px; line-height: 1.6; word-wrap: break-word; }
        .user-bubble { background-color: #f3f4f6; color: #000; border-bottom-right-radius: 4px; }
        .ai-bubble { background-color: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
        
        .bottom-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #f0f0f0; padding: 15px 0 35px 0; display: flex; justify-content: center; z-index: 8000; pointer-events: none; }
        .input-bar { width: 92%; max-width: 720px; background: #f3f4f6; border: 1.2px solid #e5e7eb; border-radius: 35px; display: flex; align-items: center; padding: 6px 10px 6px 18px; min-height: 52px; pointer-events: auto; }
        .input-bar textarea { flex: 1; background: transparent; border: none; padding: 10px 0; font-size: 16px; outline: none; color: #1a1a1a; resize: none; max-height: 150px; overflow-y: auto; line-height: 1.4; }
        
        .actions-right { display: flex; align-items: center; gap: 10px; }
        #mike-btn, .send-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; background: transparent; }
        .send-btn { background: #000; color: #fff; font-size: 16px; }
        #mike-btn.recording { color: #ff4d4d; background: #ffebeb; }
        
        pre { background: #1e1e1e !important; color: #d4d4d4 !important; padding: 45px 15px 15px 15px; border-radius: 12px; margin: 15px 0; overflow-x: auto; position: relative; }
        .code-copy-btn { position: absolute; top: 10px; right: 12px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header"><h2>Recent Chats</h2><i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i></div>
            <ul id="chat-list" class="chat-list"></ul>
        </div>
        <div style="padding: 20px;"><button onclick="createNewChat()" style="width:100%; padding:14px; background:#000; color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:600;"><i class="fas fa-plus"></i> New Chat</button></div>
    </div>
    <div class="wrapper">
        <header>
            <div class="header-left" onclick="toggleSidebar()"><div class="menu-btn-container"><div class="menu-line-1"></div><div class="menu-line-2"></div><div class="menu-line-3"></div></div></div>
            <div class="header-center"><div class="model-name">DATEX Ai Model</div><div class="version-pill">Fast 1.5</div></div>
            <div class="header-right"><div class="logo-container"><img src="logo.jpg.jpg" alt="Logo"></div></div>
        </header>
        <main class="main-content" id="chat-container"><div class="welcome-screen" id="welcome-screen">Welcome To<br><span>DATEX Ai</span></div></main>
        <div class="bottom-container">
            <div class="input-bar">
                <i class="fas fa-plus" style="color:#777; font-size: 18px; margin-right: 12px;"></i>
                <textarea id="user-input" placeholder="Ask DATEX Ai..." rows="1" oninput="autoGrow(this)"></textarea>
                <div class="actions-right">
                    <div id="mike-btn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></div>
                    <button class="send-btn" onclick="callDatexAPI()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const GROQ_API_KEY = "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"; 
    let chatHistory = JSON.parse(localStorage.getItem('datex_full_history')) || [];
    let isNewSession = true, activeChatIndex = -1;

    marked.setOptions({ gfm: true, breaks: true });

    function autoGrow(element) { element.style.height = "auto"; element.style.height = (element.scrollHeight) + "px"; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function createNewChat() { isNewSession = true; activeChatIndex = -1; document.getElementById('chat-container').innerHTML = `<div class="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>`; if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar(); }

    function renderChatList() {
        const list = document.getElementById('chat-list'); list.innerHTML = "";
        chatHistory.slice().reverse().forEach((chat, idx) => {
            const actIdx = chatHistory.length - 1 - idx;
            const item = document.createElement('div');
            item.className = 'chat-item-wrapper';
            item.onclick = () => loadSelectedChat(actIdx, true);
            item.innerHTML = `<div class="chat-item">${chat.title}</div><i class="fas fa-trash-alt delete-chat-btn"></i>`;
            item.querySelector('.delete-chat-btn').onclick = (e) => { e.stopPropagation(); deleteHistoryItem(actIdx); };
            list.appendChild(item);
        });
    }
    
    function deleteHistoryItem(idx) { 
        chatHistory.splice(idx, 1); 
        localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); 
        renderChatList(); 
        if(chatHistory.length === 0 || activeChatIndex === idx) {
            // Hum sidebar close nahi karenge as per request
            createNewChatNoToggle();
        } 
    }

    // New function to reset without closing sidebar
    function createNewChatNoToggle() {
        isNewSession = true; activeChatIndex = -1; 
        document.getElementById('chat-container').innerHTML = `<div class="welcome-screen">Welcome To<br><span>DATEX Ai</span></div>`;
    }

    function loadSelectedChat(idx, toggle) { 
        if(!chatHistory[idx]) return;
        activeChatIndex = idx; isNewSession = false; 
        const cont = document.getElementById('chat-container');
        cont.innerHTML = ""; 
        chatHistory[idx].messages.forEach((msg) => { msg.role === "user" ? addUserMessageToUI(msg.content) : addAiMessageToUI(msg.content, false); }); 
        if(toggle) toggleSidebar(); 
    }

    function addUserMessageToUI(text) { 
        const cont = document.getElementById('chat-container'); 
        if(document.querySelector('.welcome-screen')) document.querySelector('.welcome-screen').remove(); 
        const row = document.createElement('div'); row.className = 'message-row user-row';
        row.innerHTML = `<div class="bubble user-bubble">${text}</div>`;
        cont.appendChild(row); cont.scrollTop = cont.scrollHeight; 
    }
    
    function addAiMessageToUI(text, isNew) { 
        const cont = document.getElementById('chat-container'); 
        const row = document.createElement('div'); row.className = 'message-row ai-row';
        row.innerHTML = `<img src="logo.jpg.jpg" style="width:34px; height:34px; border-radius:50%; margin-right:12px; border:1px solid #eee;"><div class="bubble ai-bubble"></div>`; 
        const bubble = row.querySelector('.ai-bubble'); cont.appendChild(row); 
        if(isNew) { typeEffect(bubble, text); } else { bubble.innerHTML = marked.parse(text); }
        cont.scrollTop = cont.scrollHeight; 
    }

    function typeEffect(el, text) {
        let i = 0;
        function typing() {
            if (i <= text.length) {
                el.innerHTML = marked.parse(text.substring(0, i));
                const cont = document.getElementById('chat-container');
                cont.scrollTop = cont.scrollHeight; 
                i++; setTimeout(typing, 5);
            }
        }
        typing();
    }

    async function callDatexAPI() {
        const input = document.getElementById('user-input'), msg = input.value.trim();
        if (!msg) return;
        if (isNewSession) { chatHistory.push({ title: msg.substring(0,30), messages: [] }); activeChatIndex = chatHistory.length - 1; isNewSession = false; }
        chatHistory[activeChatIndex].messages.push({ role: "user", content: msg });
        addUserMessageToUI(msg);
        input.value = ""; input.style.height = "auto";
        const aiRow = document.createElement('div'); aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `<img src="logo.jpg.jpg" style="width:34px; height:34px; border-radius:50%; margin-right:12px; border:1px solid #eee;"><div class="bubble ai-bubble">Thinking...</div>`;
        document.getElementById('chat-container').appendChild(aiRow); const bubble = aiRow.querySelector('.ai-bubble');
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST', headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "messages": [{ "role": "system", "content": `You are DATEX Ai. Created by N.Sujal Kumar.` }, ...chatHistory[activeChatIndex].messages],
                    "model": "llama-3.3-70b-versatile"
                })
            });
            const data = await res.json();
            const aiRes = data.choices[0].message.content;
            chatHistory[activeChatIndex].messages.push({ role: "assistant", content: aiRes });
            localStorage.setItem('datex_full_history', JSON.stringify(chatHistory));
            renderChatList(); bubble.innerHTML = ""; typeEffect(bubble, aiRes);
        } catch (e) { bubble.innerText = "Error connecting to AI."; }
    }

    // --- Mike/Voice Recognition Feature ---
    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => { document.getElementById('mike-btn').classList.add('recording'); };
        recognition.onend = () => { document.getElementById('mike-btn').classList.remove('recording'); };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const inputField = document.getElementById('user-input');
            inputField.value = transcript;
            autoGrow(inputField);
        };
    }

    function toggleVoice() {
        if (!recognition) { alert("Speech recognition not supported in this browser."); return; }
        recognition.start();
    }
    // --------------------------------------

    document.getElementById('user-input').addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); callDatexAPI(); } });
    window.onload = () => { renderChatList(); if(chatHistory.length > 0) loadSelectedChat(chatHistory.length - 1, false); };
    </script>
</body>
</html>
